name: Build APK

on:
  push:
    branches: [ main, master ]
    tags: [ 'v*' ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3
        with:
          api-level: 34

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: 8.9

      - name: Sync web assets
        run: |
          mkdir -p android/app/src/main/assets
          cp index.html android/app/src/main/assets/index.html

      - name: Build APK
        run: |
          cd android
          gradle assembleDebug --no-daemon

      - name: Copy APK
        run: |
          mkdir -p apk
          cp android/app/build/outputs/apk/debug/app-debug.apk apk/XOLERIC-v2.0.0.apk

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: XOLERIC-APK
          path: apk/XOLERIC-v2.0.0.apk

      - name: Create Release
        if: startsWith(github.ref, 'refs/tags/v')
        run: |
          gh release create "${{ github.ref_name }}" \
            --title "XOLERIC ${{ github.ref_name }}" \
            --notes-file /dev/stdin \
            --latest \
            apk/XOLERIC-v2.0.0.apk <<'NOTES'
          XOLERIC super-app — productivity, learning, and focus tools
          
          ## What's New
          - Full offline WebView app
          - 4 themes: Dark, Light, Neon, Ocean
          - 15-level ranking system
          - Daily challenges
          - Focus timer (Pomodoro)
          - SRS review system
          - Data export/import
          NOTES
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
