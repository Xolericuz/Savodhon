<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>XOLƎRIƆ</title>
    
    <meta name="theme-color" content="#0b0b0f">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    
    <link rel="manifest" href="data:application/manifest+json,{
        &quot;name&quot;: &quot;XOLERIC Evolution&quot;,
        &quot;short_name&quot;: &quot;XOLERIC&quot;,
        &quot;start_url&quot;: &quot;.&quot;,
        &quot;display&quot;: &quot;fullscreen&quot;,
        &quot;background_color&quot;: &quot;#0b0b0f&quot;,
        &quot;theme_color&quot;: &quot;#0b0b0f&quot;,
        &quot;icons&quot;: [{
            &quot;src&quot;: &quot;data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Crect width='100' height='100' rx='20' fill='%230b0b0f'/%3E%3Ctext x='50' y='70' font-size='60' text-anchor='middle' fill='%234f46e5' font-family='Arial' font-weight='bold'%3EX%3C/text%3E%3C/svg%3E&quot;,
            &quot;sizes&quot;: &quot;192x192 512x512&quot;,
            &quot;type&quot;: &quot;image/svg+xml&quot;
        }]
    }">
    
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', sans-serif;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }

        :root {
            --bg: #0b0b0f;
            --surface: rgba(20, 20, 30, 0.6);
            --glass: rgba(255, 255, 255, 0.03);
            --border: rgba(255, 255, 255, 0.08);
            --accent: #4f46e5;
            --accent-glow: rgba(79, 70, 229, 0.4);
            --text: #f0f0f5;
            --text-dim: #8f8fa3;
            --gold: #fbbf24;
            --success: #10b981;
            --radius-card: 32px;
            --radius-pill: 60px;
        }

        body {
            background-color: var(--bg);
            color: var(--text);
            height: 100dvh;
            overflow: hidden;
            position: fixed;
            width: 100%;
        }

        .glass {
            background: var(--glass);
            backdrop-filter: blur(24px);
            -webkit-backdrop-filter: blur(24px);
            border: 1px solid var(--border);
        }

        /* ANIMATIONS */
        @keyframes fadeInScale {
            from { opacity: 0; transform: scale(0.96); }
            to { opacity: 1; transform: scale(1); }
        }
        @keyframes successPop {
            0% { transform: scale(1); }
            50% { transform: scale(1.05); }
            100% { transform: scale(1); }
        }
        @keyframes blink {
            50% { opacity: 0; }
        }

        /* SCREENS */
        .screen {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            transition: opacity 0.5s cubic-bezier(0.2, 0.9, 0.3, 1);
            background: var(--bg);
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        #welcomeScreen {
            z-index: 10000;
            align-items: center;
            justify-content: center;
            padding: 24px;
            background: radial-gradient(circle at 70% 30%, #1e1b3a, var(--bg));
        }
        #welcomeScreen.hide {
            opacity: 0;
            pointer-events: none;
        }

        .login-card {
            width: 100%;
            max-width: 380px;
            padding: 40px 30px;
            border-radius: var(--radius-card);
            text-align: center;
            animation: fadeInScale 0.6s ease;
        }
        .logo-big {
            font-size: 3.5rem;
            font-weight: 800;
            letter-spacing: -2px;
            background: linear-gradient(135deg, #fff, #a5b4fc);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            margin-bottom: 8px;
        }
        .logo-small {
            color: var(--accent);
            font-weight: 600;
            letter-spacing: 4px;
            font-size: 0.8rem;
            margin-bottom: 40px;
        }
        .input-glass {
            width: 100%;
            background: rgba(0,0,0,0.4);
            border: 1px solid var(--border);
            border-radius: 20px;
            padding: 18px;
            color: #fff;
            font-size: 1.1rem;
            text-align: center;
            margin-bottom: 24px;
            transition: 0.3s;
        }
        .input-glass:focus {
            border-color: var(--accent);
            box-shadow: 0 0 20px var(--accent-glow);
        }
        .btn-group {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }
        .btn-primary {
            background: var(--accent);
            border: none;
            border-radius: 20px;
            padding: 18px;
            font-weight: 700;
            color: #fff;
            cursor: pointer;
            transition: 0.2s;
            box-shadow: 0 8px 20px var(--accent-glow);
        }
        .btn-primary:active {
            transform: scale(0.96);
        }
        .btn-outline {
            background: transparent;
            border: 1px solid var(--border);
            border-radius: 20px;
            padding: 18px;
            font-weight: 600;
            color: var(--text-dim);
            cursor: pointer;
        }
        .btn-outline:active {
            background: rgba(255,255,255,0.05);
        }

        /* MAIN SHELL */
        #mainScreen {
            opacity: 0;
            display: none;
            flex-direction: column;
            height: 100%;
        }
        #mainScreen.visible {
            display: flex;
            opacity: 1;
        }

        /* HEADER */
        .app-header {
            padding: env(safe-area-inset-top, 20px) 24px 16px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: rgba(11,11,15,0.6);
            backdrop-filter: blur(10px);
            border-bottom: 1px solid var(--border);
        }
        .header-left {
            display: flex;
            gap: 12px;
            align-items: center;
        }
        .mode-switch {
            background: var(--surface);
            border-radius: 40px;
            padding: 4px;
            display: flex;
            gap: 4px;
            border: 1px solid var(--border);
        }
        .mode-btn {
            padding: 8px 18px;
            border-radius: 30px;
            font-weight: 600;
            font-size: 0.9rem;
            cursor: pointer;
            transition: 0.2s;
        }
        .mode-btn.active {
            background: var(--accent);
            color: white;
        }
        .user-badge {
            background: var(--surface);
            border-radius: 40px;
            padding: 8px 18px;
            font-weight: 600;
            color: var(--text-dim);
        }
        .xp-chip {
            background: var(--gold);
            color: #1e1b2b;
            padding: 6px 16px;
            border-radius: 40px;
            font-weight: 800;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        /* HUB (letter grid) */
        #hubView {
            flex: 1;
            overflow-y: auto;
            padding: 24px;
        }
        .hub-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(85px, 1fr));
            gap: 16px;
            max-width: 900px;
            margin: 0 auto;
            padding-bottom: 100px;
        }
        .letter-tile {
            aspect-ratio: 1;
            border-radius: 28px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            font-size: 2rem;
            font-weight: 700;
            position: relative;
            cursor: pointer;
            transition: 0.2s;
        }
        .letter-tile:active {
            transform: scale(0.94);
        }
        .tile-progress {
            position: absolute;
            bottom: 12px;
            width: 50px;
            height: 4px;
            background: rgba(255,255,255,0.1);
            border-radius: 4px;
            overflow: hidden;
        }
        .tile-progress-fill {
            height: 100%;
            background: var(--accent);
            width: 0%;
            transition: width 0.4s;
        }

        /* FOCUS VIEW */
        #focusView {
            display: none;
            flex: 1;
            flex-direction: column;
            background: var(--bg);
        }
        .focus-nav {
            padding: 16px 24px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .nav-back {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 40px;
            padding: 10px 20px;
            font-weight: 600;
            cursor: pointer;
        }
        .step-badge {
            color: var(--accent);
            font-weight: 700;
            letter-spacing: 1px;
        }
        .focus-content {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 0 24px;
        }
        .word-display {
            font-size: clamp(3.5rem, 15vw, 6rem);
            font-weight: 800;
            margin-bottom: 40px;
            text-align: center;
            line-height: 1.2;
            letter-spacing: 4px;
        }
        .word-display span.vocal { color: var(--text); }
        .word-display span.consonant { color: var(--accent); }
        .word-display span.dash { opacity: 0.2; padding: 0 4px; }
        
        .input-area {
            width: 100%;
            max-width: 500px;
            position: relative;
        }
        .mirror-field {
            min-height: 100px;
            border-radius: 32px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2.8rem;
            font-weight: 700;
            letter-spacing: 6px;
            border: 2px solid var(--border);
            background: rgba(0,0,0,0.5);
            transition: 0.3s;
        }
        .mirror-field.match {
            border-color: var(--success);
            color: var(--success);
            text-shadow: 0 0 20px rgba(16,185,129,0.3);
            animation: successPop 0.4s ease;
        }
        .cursor {
            display: inline-block;
            width: 4px;
            height: 3rem;
            background: var(--accent);
            margin-left: 8px;
            animation: blink 1s infinite;
            border-radius: 4px;
        }
        #hiddenInput {
            position: absolute;
            top: -50px;
            opacity: 0;
            pointer-events: none;
        }
        .status-message {
            margin-top: 24px;
            font-weight: 700;
            color: var(--success);
            opacity: 0;
            transition: 0.3s;
        }
        .next-btn {
            margin: 24px;
            padding: 18px;
            border-radius: 30px;
            font-size: 1.2rem;
            font-weight: 800;
            text-align: center;
            background: var(--text);
            color: var(--bg);
            border: none;
            opacity: 0.2;
            pointer-events: none;
            transition: 0.3s;
        }
        .next-btn.active {
            opacity: 1;
            pointer-events: auto;
            cursor: pointer;
            transform: translateY(-2px);
            box-shadow: 0 15px 30px rgba(0,0,0,0.5);
        }

        /* GUARD OVERLAY */
        #guardOverlay {
            position: fixed;
            inset: 0;
            z-index: 2000;
            background: rgba(0,0,0,0.95);
            backdrop-filter: blur(40px);
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding: 40px;
        }

        .hide { display: none !important; }
    </style>
</head>
<body>

    <div id="guardOverlay">
        <div style="font-size: 5rem; margin-bottom: 20px;">🔒</div>
        <h2 style="font-size: 2rem; margin-bottom: 12px;">XOLERIC Qulflangan</h2>
        <p style="color: var(--text-dim); margin-bottom: 40px;">To'liq ekran rejimi talab qilinadi.</p>
        <button class="btn-primary" style="padding: 18px 40px;" onclick="requestFullAccess()">DAVOM ETISH</button>
    </div>

    <!-- WELCOME SCREEN -->
    <div id="welcomeScreen" class="screen">
        <div class="login-card glass">
            <div class="logo-big">📚</div>
            <div class="logo-small">XOLƎRIƆ</div>
            <input type="text" id="userNameInput" class="input-glass" placeholder="Ismingiz" autocomplete="off">
            <div class="btn-group">
                <button class="btn-primary" id="startBtn">KIRISH</button>
                <button class="btn-outline" id="continueLastBtn">OXIRGI JARAYON</button>
            </div>
        </div>
    </div>

    <!-- MAIN APP -->
    <div id="mainScreen" class="screen">
        <header class="app-header">
            <div class="header-left">
                <div class="mode-switch" id="modeSwitch">
                    <span class="mode-btn active" data-mode="letter">Harflar</span>
                    <span class="mode-btn" data-mode="global">Global</span>
                </div>
            </div>
            <div style="display: flex; align-items: center; gap: 12px;">
                <span id="userNameDisplay" class="user-badge">Mehman</span>
                <div class="xp-chip">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor"><path d="M12 2l3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01L12 2z"/></svg>
                    <span id="xpDisplay">0</span>
                </div>
            </div>
        </header>

        <!-- HUB VIEW (letter grid) -->
        <div id="hubView">
            <div class="hub-grid" id="letterGrid"></div>
        </div>

        <!-- FOCUS VIEW (learning) -->
        <div id="focusView">
            <div class="focus-nav">
                <button class="nav-back" id="backBtn">← CHIQISH</button>
                <div class="step-badge" id="stepLabel">1-BOSQICH</div>
                <button class="nav-back" id="speakBtn">🔊</button>
            </div>
            <div class="focus-content" onclick="focusInput()">
                <div class="word-display" id="wordBox"></div>
                <div class="input-area">
                    <div class="mirror-field" id="mirrorField">
                        <span id="textMirror"></span><span class="cursor" id="cursor"></span>
                    </div>
                </div>
                <div class="status-message" id="statusMsg">✅ TO'G'RI! +10 XP</div>
            </div>
            <input type="text" id="hiddenInput" autocomplete="off" spellcheck="false">
            <button class="next-btn" id="nextBtn" onclick="handleNext()">KEYINGI →</button>
        </div>
    </div>

        // ==================== FULLSCREEN PERSISTENCE ====================
        async function enterFullscreen() {
            try {
                if (!document.fullscreenElement) {
                    if (document.documentElement.requestFullscreen) await document.documentElement.requestFullscreen();
                    else if (document.documentElement.webkitRequestFullscreen) await document.documentElement.webkitRequestFullscreen();
                }
                history.pushState(null, null, location.href);
            } catch (e) {}
        }

        function requestFullAccess() {
            enterFullscreen();
            dom.guard.style.display = 'none';
        }

        document.addEventListener('fullscreenchange', () => {
            if (!document.fullscreenElement && !document.webkitIsFullScreen) {
                dom.guard.style.display = 'flex';
            }
        });

        window.addEventListener('popstate', () => {
            history.pushState(null, null, location.href);
            enterFullscreen();

        function playSuccess() {
            // Simple beep using audio context
            const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.type = 'sine';
            gain.gain.value = 0.1;
            osc.connect(gain);
            gain.connect(audioCtx.destination);
            osc.frequency.setValueAtTime(523, audioCtx.currentTime);
            osc.start();
            osc.stop(audioCtx.currentTime + 0.1);
            setTimeout(() => {
                osc.frequency.setValueAtTime(659, audioCtx.currentTime);
            }, 80);
            setTimeout(() => {
                osc.frequency.setValueAtTime(783, audioCtx.currentTime);
            }, 160);
        }

        // ==================== RENDER HUB ====================
        function renderHub() {
            const letters = Object.keys(DB);
            dom.letterGrid.innerHTML = '';
            letters.forEach(letter => {
                const tile = document.createElement('div');
                tile.className = 'letter-tile glass';
                tile.textContent = letter;
                const prog = state.letterProgress[letter] || 0;
                const bar = document.createElement('div');
                bar.className = 'tile-progress';
                const fill = document.createElement('div');
                fill.className = 'tile-progress-fill';
                fill.style.width = `${prog}%`;
                bar.appendChild(fill);
                tile.appendChild(bar);
                tile.onclick = () => startLetterMode(letter);
                dom.letterGrid.appendChild(tile);
            });
        }

        // ==================== START LETTER MODE ====================
        function startLetterMode(letter) {
            currentMode = 'letter';
            currentLetter = letter;
            // Load progress for this letter
            const prog = state.letterProgress[letter] || 0;
            // Determine step based on progress: steps 1-6 each 16.66% (100/6 ≈ 16.67)
            let step = 1;
            if (prog >= 100) step = 6;
            else step = Math.floor(prog / 16.67) + 1;
            currentStep = step;
            currentWordIdx = 0; // start from first word of that step (could be smarter, but simple)
            loadWord();
            dom.hubView.classList.add('hide');
            dom.focusView.style.display = 'flex';
            focusInput();
        }

        // ==================== GLOBAL MODE: BUILD WORD LIST ====================
        function buildGlobalWordList(step) {
            const letters = Object.keys(DB);
            const list = [];
            letters.forEach(letter => {
                const stepKey = `step${step}`;
                if (DB[letter][stepKey]) {
                    DB[letter][stepKey].forEach(word => {
                        list.push({
                            letter,
                            step,
                            word,
                            clean: word.replace(/[-']/g, '').toLowerCase()
                        });
                    });
                }
            });
            return list;
        }

        function startGlobalMode() {
            currentMode = 'global';
            // Determine step based on global progress (simplified: start from step where progress incomplete)
            let step = 1;
            for (let s=1; s<=6; s++) {
                if ((state.globalProgress[`step${s}`] || 0) < 100) {
                    step = s;
                    break;
                }
            }
            currentStep = step;
            globalWordList = buildGlobalWordList(step);
            // Find index based on progress percentage
            const prog = state.globalProgress[`step${step}`] || 0;
            const totalWords = globalWordList.length;
            currentWordIdx = Math.floor((prog / 100) * totalWords);
            if (currentWordIdx >= totalWords) currentWordIdx = totalWords - 1;
            loadWord();
            dom.hubView.classList.add('hide');
            dom.focusView.style.display = 'flex';
            focusInput();
        }

        // ==================== LOAD CURRENT WORD ====================
        function loadWord() {
            let wordObj;
            if (currentMode === 'letter') {
                const stepKey = `step${currentStep}`;
                const words = DB[currentLetter][stepKey];
                if (!words || words.length === 0) {
                    closeFocus();
                    return;
                }
                wordObj = {
                    letter: currentLetter,
                    step: currentStep,
                    word: words[currentWordIdx],
                    clean: words[currentWordIdx].replace(/[-']/g, '').toLowerCase()
                };
            } else {
                if (!globalWordList || globalWordList.length === 0) {
                    closeFocus();
                    return;
                }
                wordObj = globalWordList[currentWordIdx];
            }

            // Update UI
            dom.stepLabel.textContent = `${currentStep}-BOSQICH`;
            const syls = wordObj.word.split('-');
            dom.wordBox.innerHTML = syls.map((s, i) => 
                `<span class="${i%2===0?'vocal':'consonant'}">${s}</span>`
            ).join('<span class="dash">-</span>');

            dom.hiddenInput.value = '';
            dom.textMirror.textContent = '';
            dom.mirrorField.classList.remove('match');
            dom.statusMsg.style.opacity = '0';
            dom.nextBtn.classList.remove('active');
            dom.cursor.style.display = 'inline-block';
        }

        function focusInput() {
            dom.hiddenInput.focus();
        }

        // ==================== INPUT HANDLING ====================
        dom.hiddenInput.addEventListener('input', (e) => {
            const val = e.target.value.toLowerCase();
            dom.textMirror.textContent = val;
            vibrate(20);

            // Get current word's clean version
            let cleanTarget = '';
            if (currentMode === 'letter') {
                const stepKey = `step${currentStep}`;
                const words = DB[currentLetter][stepKey];
                if (words && words[currentWordIdx]) {
                    cleanTarget = words[currentWordIdx].replace(/[-']/g, '').toLowerCase();
                }
            } else {
                if (globalWordList[currentWordIdx]) {
                    cleanTarget = globalWordList[currentWordIdx].clean;
                }
            }

            if (val.replace(/['\s-]/g, '') === cleanTarget) {
                onCorrect();
            }
        });

        dom.hiddenInput.addEventListener('keydown', (e) => {
            if (e.key === 'Enter' && dom.nextBtn.classList.contains('active')) {
                handleNext();
            }
        });

        function onCorrect() {
            playSuccess();
            vibrate(50);
            dom.mirrorField.classList.add('match');
            dom.cursor.style.display = 'none';
            dom.statusMsg.style.opacity = '1';
            dom.nextBtn.classList.add('active');
            dom.hiddenInput.blur();

            // Add XP
            state.xp += 10;
            dom.xpDisplay.textContent = state.xp;
            localStorage.setItem('xoleric_xp', state.xp);

            // Update progress
            if (currentMode === 'letter') {
                const totalSteps = 6;
                const wordsPerStep = 6;
                const totalWordsPerLetter = totalSteps * wordsPerStep;
                const completedWords = (currentStep-1)*wordsPerStep + (currentWordIdx+1);
                const percent = Math.floor((completedWords / totalWordsPerLetter) * 100);
                state.letterProgress[currentLetter] = percent;
                localStorage.setItem('xoleric_letterProgress', JSON.stringify(state.letterProgress));
            } else {
                // global mode: update step progress
                const totalWords = globalWordList.length;
                const completed = currentWordIdx + 1;
                const percent = Math.floor((completed / totalWords) * 100);
                state.globalProgress[`step${currentStep}`] = percent;
                localStorage.setItem('xoleric_globalProgress', JSON.stringify(state.globalProgress));
            }
        }

        function handleNext() {
            if (!dom.nextBtn.classList.contains('active')) return;

            if (currentMode === 'letter') {
                // Move to next word in letter mode
                const stepKey = `step${currentStep}`;
                const words = DB[currentLetter][stepKey];
                if (currentWordIdx + 1 < words.length) {
                    currentWordIdx++;
                } else {
                    // Next step
                    if (currentStep < 6) {
                        currentStep++;
                        currentWordIdx = 0;
                    } else {
                        // Completed all steps for this letter
                        closeFocus();
                        return;
                    }
                }
            } else {
                // Global mode
                if (currentWordIdx + 1 < globalWordList.length) {
                    currentWordIdx++;
                } else {
                    // Next step
                    if (currentStep < 6) {
                        currentStep++;
                        globalWordList = buildGlobalWordList(currentStep);
                        currentWordIdx = 0;
                    } else {
                        // All steps completed
                        closeFocus();
                        return;
                    }
                }
            }

            // Save last session
            if (currentMode === 'letter') {
                localStorage.setItem('xoleric_lastMode', 'letter');
                localStorage.setItem('xoleric_lastLetter', currentLetter);
                localStorage.setItem('xoleric_lastStep', currentStep);
                localStorage.setItem('xoleric_lastWordIdx', currentWordIdx);
            } else {
                localStorage.setItem('xoleric_lastMode', 'global');
                localStorage.setItem('xoleric_lastGlobalStep', currentStep);
                localStorage.setItem('xoleric_lastGlobalIndex', currentWordIdx);
            }

            loadWord();
            focusInput();
        }

        function closeFocus() {
            dom.focusView.style.display = 'none';
            dom.hubView.classList.remove('hide');
            renderHub();
        }

        // ==================== EVENT LISTENERS ====================
        dom.startBtn.addEventListener('click', async () => {
            const name = dom.userNameInput.value.trim();
            if (!name) {
                alert('Ismingizni kiriting');
                return;
            }
            state.user = name;
            localStorage.setItem('xoleric_user', name);
            dom.userNameDisplay.textContent = name.toUpperCase();
            await enterFullscreen();
            dom.welcome.classList.add('hide');
            dom.main.classList.add('visible');
            renderHub();
        });

        dom.continueLastBtn.addEventListener('click', async () => {
            if (!state.user) {
                alert('Avval ismingizni kiriting');
                return;
            }
            await enterFullscreen();
            dom.welcome.classList.add('hide');
            dom.main.classList.add('visible');
            renderHub();

            // Resume last session
            if (state.lastMode === 'letter') {
                startLetterMode(state.lastLetter);
                currentStep = state.lastStep;
                currentWordIdx = state.lastWordIdx;
                loadWord();
            } else {
                startGlobalMode();
                currentStep = state.lastGlobalStep;
                currentWordIdx = state.lastGlobalIndex;
                globalWordList = buildGlobalWordList(currentStep);
                loadWord();
            }
        });

        dom.backBtn.addEventListener('click', closeFocus);
        dom.speakBtn.addEventListener('click', () => {
            let word = '';
            if (currentMode === 'letter') {
                const stepKey = `step${currentStep}`;
                word = DB[currentLetter][stepKey][currentWordIdx].replace(/-/g, '');
            } else {
                word = globalWordList[currentWordIdx].word.replace(/-/g, '');
            }
            const utter = new SpeechSynthesisUtterance(word);
            utter.lang = 'uz-UZ';
            speechSynthesis.speak(utter);
        });

        // Mode switch
        dom.modeSwitch.forEach(btn => {
            btn.addEventListener('click', (e) => {
                dom.modeSwitch.forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                const mode = btn.dataset.mode;
                // If switching, maybe reset view? For now just change mode indicator
                // In a full app, we might show different hub views. Here hub always shows letters.
                // Global mode will be started via some other button? We'll add a "Global bosqich" tile later.
            });
        });

        // Add a global tile to hub
        function addGlobalTile() {
            const tile = document.createElement('div');
            tile.className = 'letter-tile glass';
            tile.style.background = 'linear-gradient(145deg, #2a2a3a, #1a1a2a)';
            tile.innerHTML = '<span style="font-size:1.2rem; font-weight:800;">🌍 GLOBAL</span><div style="font-size:0.8rem; margin-top:8px;">6 bosqich</div>';
            tile.onclick = () => startGlobalMode();
            dom.letterGrid.prepend(tile);
        }

        // Override renderHub to add global tile
        const originalRender = renderHub;
        renderHub = function() {
            originalRender();
            addGlobalTile();
        };

        // ==================== INITIAL RENDER ====================
        renderHub();

        // Guard: ensure fullscreen on any user interaction after start
        document.addEventListener('touchstart', () => {
            if (dom.main.classList.contains('visible') && !document.fullscreenElement) {
                enterFullscreen();
            }
        });
    </script>
</body>
</html>
