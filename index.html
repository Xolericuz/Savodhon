<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#ffffff">
    <title>XOLƎRIƆ - Savodxonlik</title>
    <link rel="manifest" href="manifest.json">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #ffffff;
            --text: #333333;
            --primary: #000000;
            --gray-light: #f5f5f5;
            --gray-border: #e0e0e0;
            --accent: #2ecc71;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; user-select: none; }
        body { background-color: var(--bg); color: var(--text); -webkit-tap-highlight-color: transparent; }
        
        /* HEADER */
        header { display: flex; align-items: center; justify-content: center; padding: 20px; border-bottom: 1px solid var(--gray-border); position: sticky; top: 0; background: var(--bg); z-index: 10; }
        .logo { font-size: 1.5rem; font-weight: 800; letter-spacing: 2px; display: flex; align-items: center; gap: 10px; }
        .logo img { width: 40px; height: 40px; border-radius: 8px; object-fit: cover; }

        /* MAIN ALPHABET GRID */
        #main-view { padding: 30px 20px; max-width: 800px; margin: 0 auto; }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(70px, 1fr)); gap: 15px; }
        .letter-btn { background: var(--gray-light); border: 2px solid transparent; border-radius: 16px; aspect-ratio: 1; display: flex; align-items: center; justify-content: center; font-size: 2rem; font-weight: 600; cursor: pointer; transition: 0.2s; color: var(--text); }
        .letter-btn:active { transform: scale(0.95); background: var(--gray-border); }

        /* FOCUS MODE (FULLSCREEN) */
        #focus-view { position: fixed; inset: 0; background: var(--bg); z-index: 100; display: none; flex-direction: column; overflow-y: auto; }
        .focus-header { padding: 20px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid var(--gray-border); }
        .back-btn { font-size: 1rem; font-weight: 600; background: none; border: none; cursor: pointer; color: var(--text); padding: 10px; }
        
        .focus-content { flex: 1; display: flex; flex-direction: column; align-items: center; padding: 40px 20px; max-width: 600px; margin: 0 auto; width: 100%; }
        .big-letter { font-size: 8rem; font-weight: 800; line-height: 1; margin-bottom: 30px; }
        
        .step-title { font-size: 1.2rem; font-weight: 600; color: #666; margin-bottom: 20px; width: 100%; text-align: left; }
        .words-container { display: flex; flex-direction: column; gap: 15px; width: 100%; margin-bottom: 40px; }
        .word-card { background: var(--gray-light); padding: 20px; border-radius: 12px; font-size: 1.8rem; text-align: center; font-weight: 600; letter-spacing: 1px; border: 1px solid var(--gray-border); }
        .syl-1 { color: var(--primary); }
        .syl-2 { color: #888; }
        .syl-3 { color: #444; }

        /* NAVIGATION BUTTONS */
        .controls { display: flex; gap: 15px; width: 100%; margin-top: auto; padding-bottom: 20px; }
        .btn { flex: 1; padding: 18px; border-radius: 12px; font-size: 1.1rem; font-weight: 600; border: none; cursor: pointer; transition: 0.2s; }
        .btn-primary { background: var(--primary); color: white; }
        .btn-primary:active { transform: translateY(2px); background: #333; }
        .hidden { display: none !important; }
    </style>
</head>
<body>

    <header>
        <div class="logo">
            <img src="https://i.ibb.co/31z50p3/logo.png" alt="Logo"> XOLƎRIƆ
        </div>
    </header>

    <main id="main-view">
        <h2 style="margin-bottom: 20px; font-size: 1.2rem; color: #666;">Alifboni o'rganamiz</h2>
        <div class="grid" id="alphabet-grid"></div>
    </main>

    <div id="focus-view">
        <div class="focus-header">
            <button class="back-btn" onclick="closeFocus()">← Orqaga</button>
            <div style="font-weight: 600; color: #888;" id="step-indicator">1/3 Qadam</div>
            <div style="width: 70px;"></div> </div>
        <div class="focus-content">
            <div class="big-letter" id="focus-letter">A a</div>
            <div class="step-title" id="focus-title">Oddiy so'zlar (2 bo'g'in)</div>
            <div class="words-container" id="words-box">
                </div>
            
            <div class="controls">
                <button class="btn btn-primary" id="next-btn" onclick="nextStep()">Keyingi qadam →</button>
            </div>
        </div>
    </div>

<script>
    // To'liq alifbo ro'yxati (Namunaviy so'zlar bazasi bilan)
    // Diqqat: Qolgan xarflar uchun ham xuddi shu formatda so'zlarni to'ldirib chiqishingiz mumkin.
    const db = {

},

"O":{
step1:["O-ta","O-na","O-l","O-q","O-y","O-r"],

step3:["O-na-tili","O-yin-choq","O-lma-zor","O-chiq-cha","O-qil-ona","O-rik-zor"]
},

"P":{
step1:["Pa-l","Po-l","Pu-l","Pa-r","Po-r","Pu-x"],

step3:["Paxta-kor","Po-chta-xo-na","Pu-lik-lik","Pa-lov-xo'r","Po-li-si-ya","Pu-lar-chi"]
},

"Q":{

},

},

},

"V":{

step2:["Va-li","Vo-li","Vi-deo","Va-diy","Vo-zin","Vi-la"],
step3:["Vi-deo-lar","Va-diy-lik","Vo-zin-li","Vi-la-chi","Va-li-yat","Vo-li-yat"]
},

"X":{
step1:["Xa-l","Xo-l","Xu-r","Xa-r","Xo-z","Xu-l"],
step2:["Xa-lq","Xo-na","Xu-rmo","Xa-rid","Xo-zir","Xu-loq"],
step3:["Xa-rid-or","Xo-na-do-n","Xu-rmo-zor","Xa-lq-la-r","Xo-zir-cha","Xu-loq-cha"]
},

"Y":{
step1:["Ya-r","Yo-l","Yu-z","Ya-z","Yo-n","Yu-k"],
step2:["Yo-zuv","Yu-zum","Ya-rim","Yo-nal","Yu-kla","Ya-xshi"],
step3:["Yo-zuv-chi","Yu-kla-moq","Ya-xshi-lik","Yo-nal-ish","Yu-zum-zor","Ya-rim-cha"]
},

"Z":{
step1:["Za-r","Zo-r","Zu-r","Za-k","Zo-n","Zu-l"],
step2:["Za-rar","Zo-ri","Zu-lm","Za-mon","Zo-na","Zu-luk"],
step3:["Za-mon-lar","Zo-na-do-n","Zu-lm-kor","Za-rar-li","Zo-riq-moq","Zu-luk-lik"]
},

"O'":{
step1:["O'-q","O'-n","O'-r","O'-t","O'-l","O'-z"],
step2:["O'-rik","O'-g'il","O'-choq","O'-rni","O'-lim","O'-zak"],
step3:["O'-rik-zor","O'-g'il-cha","O'-lim-lar","O'-zak-li","O'-choq-chi","O'-rni-da"]
},

"G'":{
step1:["G'-o'r","G'-am","G'-o'z","G'-ar","G'-un","G'-ur"],
step2:["G'-ozal","G'-alla","G'-ozor","G'-urur","G'-amxo'r","G'-o'zap"],
step3:["G'-ozal-lik","G'-alla-kor","G'-urur-li","G'-amxo'r-lik","G'-ozor-lik","G'-o'zap-chi"]
},

"Sh":{
step1:["Sha-m","Sho-r","Shu-r","Sha-r","Sho-l","Shu-k"],
step2:["Sha-mal","Sho-ra","Shu-kuh","Sha-raf","Sho-la","Shu-kr"],
step3:["Sha-raf-li","Sho-la-chi","Shu-kuh-li","Sha-mal-lar","Sho-ra-lik","Shu-kr-chi"]
},

"Ch":{
step1:["Cha-y","Cho-y","Chu-q","Cha-r","Cho-l","Chu-l"],
step2:["Cha-yla","Cho-pon","Chu-qur","Cha-ra","Cho-lar","Chu-luk"],
step3:["Cha-yla-chi","Cho-pon-lik","Chu-qur-lik","Cha-ra-la-moq","Cho-lar-chi","Chu-luk-lik"]
},

"Ng":{
step1:["Ng-a","Ng-u","Ng-o","Ng-e","Ng-i","Ng-a"],
step2:["Ng-o-li","Ng-a-na","Ng-u-lar","Ng-o-ra","Ng-a-li","Ng-i-za"],
step3:["Ng-o-li-chi","Ng-a-na-lik","Ng-u-lar-chi","Ng-o-ra-lik","Ng-a-li-lar","Ng-i-za-li"]
}

       } 
    

    const alphabet = ["A", "B", "D", "E", "F", "G", "H", "I", "J", "K", "L", "M", "N", "O", "P", "Q", "R", "S", "T", "U", "V", "X", "Y", "Z", "O'", "G'", "Sh", "Ch", "Ng"];

    let currentLetter = "";
    let currentStep = 1;

    // Alifboni ekranga chizish
    const grid = document.getElementById('alphabet-grid');
    alphabet.forEach(letter => {
        let btn = document.createElement('div');
        btn.className = 'letter-btn';
        btn.innerText = letter;
        btn.onclick = () => openFocus(letter);
        grid.appendChild(btn);
    });

    function openFocus(letter) {
        if(!db[letter]) {
            alert(`Hozircha faqat A, B, D harflariga namuna so'zlar kiritilgan. Dastur kodiga kirib ${letter} harfi uchun so'zlarni yuqoridagi formatda qo'shishingiz kerak.`);
            return;
        }
        currentLetter = letter;
        currentStep = 1;
        document.getElementById('main-view').style.display = 'none';
        document.getElementById('focus-view').style.display = 'flex';
        document.getElementById('focus-letter').innerText = letter + " " + letter.toLowerCase();
        
        renderStep();
        window.scrollTo(0, 0);
    }

    function closeFocus() {
        document.getElementById('focus-view').style.display = 'none';
        document.getElementById('main-view').style.display = 'block';
    }

    function renderStep() {
        const box = document.getElementById('words-box');
        const title = document.getElementById('focus-title');
        const indicator = document.getElementById('step-indicator');
        const nextBtn = document.getElementById('next-btn');
        
        box.innerHTML = '';
        indicator.innerText = `${currentStep}/3 Qadam`;

        let words = [];
        if(currentStep === 1) { title.innerText = "1-Qadam: Qisqa so'zlar"; words = db[currentLetter].step1; }
        if(currentStep === 2) { title.innerText = "2-Qadam: O'rtacha so'zlar (6 harf)"; words = db[currentLetter].step2; }
        if(currentStep === 3) { title.innerText = "3-Qadam: Murakkab va uzun so'zlar"; words = db[currentLetter].step3; }

        words.forEach(word => {
            let card = document.createElement('div');
            card.className = 'word-card';
            
            // Bo'g'inlarni turli xil rangda formatlash
            let syllables = word.split('-');
            let formattedHTML = syllables.map((s, idx) => {
                let colorClass = `syl-${(idx % 3) + 1}`;
                return `<span class="${colorClass}">${s}</span>`;
            }).join('-');
            
            card.innerHTML = formattedHTML;
            box.appendChild(card);
        });

        if(currentStep === 3) {
            nextBtn.innerText = "Tugatish ✓";
            nextBtn.style.background = "var(--accent)";
        } else {
            nextBtn.innerText = "Keyingi qadam →";
            nextBtn.style.background = "var(--primary)";
        }
    }

    function nextStep() {
        if(currentStep < 3) {
            currentStep++;
            renderStep();
            document.querySelector('.focus-content').scrollTo(0, 0);
        } else {
            closeFocus();
        }
    }

    // PWA Service Worker o'rnatish
    if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
            navigator.serviceWorker.register('sw.js')
                .then(reg => console.log('Service Worker ishladi!', reg))
                .catch(err => console.log('Service Worker xatosi:', err));
        });
    }
</script>
</body>
</html>
