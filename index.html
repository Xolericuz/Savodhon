<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="theme-color" content="#131314">
    <meta name="description" content="XOLƎRIƆ Pro - Savodxonlik">
    <title>XOLƎRIƆ</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    
    <style>
        :root {
            /* Gemini Dark Theme Colors */
            --bg-main: #131314;
            --surface: rgba(255, 255, 255, 0.04);
            --surface-hover: rgba(255, 255, 255, 0.08);
            --border: rgba(255, 255, 255, 0.1);
            --text-main: #e3e3e3;
            --text-muted: #8e8e8e;
            --accent: #a8c7fa; /* Gemini Blue */
            --success: #81c995; /* Soft Green */
            --gold: #fde293;
            --font-ui: 'Inter', sans-serif;
        }
        
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: var(--font-ui); user-select: none; -webkit-tap-highlight-color: transparent; outline: none; }
        
        body { background-color: var(--bg-main); color: var(--text-main); height: 100dvh; width: 100vw; overflow: hidden; display: flex; flex-direction: column; }
        
        /* Shishasimon (Glassmorphism) Effektlar */
        .glass-panel { background: var(--surface); backdrop-filter: blur(24px); -webkit-backdrop-filter: blur(24px); border: 1px solid var(--border); border-radius: 24px; }
        
        /* Animatsiyalar */
        @keyframes fadeIn { from { opacity: 0; transform: translateY(15px); } to { opacity: 1; transform: translateY(0); } }
        @keyframes popIn { 0% { opacity: 0; transform: scale(0.9); } 100% { opacity: 1; transform: scale(1); } }
        @keyframes glowSuccess { 0% { box-shadow: 0 0 10px rgba(129,201,149,0.2); } 50% { box-shadow: 0 0 25px rgba(129,201,149,0.5); } 100% { box-shadow: 0 0 10px rgba(129,201,149,0.2); } }

        /* KIREK (WELCOME) EKRANI */
        #welcome-view { position: fixed; inset: 0; display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 200; background: var(--bg-main); transition: opacity 0.5s ease; padding: 24px; }
        .logo-title { font-size: 3.5rem; font-weight: 700; letter-spacing: 2px; background: linear-gradient(90deg, #a8c7fa, #d3e3fd); -webkit-background-clip: text; -webkit-text-fill-color: transparent; margin-bottom: 8px; }
        .logo-sub { color: var(--text-muted); font-size: 1.1rem; margin-bottom: 40px; }
        
        .login-box { width: 100%; max-width: 340px; padding: 32px 24px; display: flex; flex-direction: column; gap: 20px; animation: fadeIn 0.8s ease forwards; }
        .name-input { width: 100%; background: rgba(0,0,0,0.2); border: 1px solid var(--border); color: var(--text-main); padding: 18px; border-radius: 16px; font-size: 1.2rem; text-align: center; transition: all 0.3s; }
        .name-input:focus { border-color: var(--accent); background: rgba(168, 199, 250, 0.05); }
        
        .btn { width: 100%; background: var(--text-main); color: var(--bg-main); border: none; padding: 18px; border-radius: 16px; font-size: 1.15rem; font-weight: 600; cursor: pointer; transition: transform 0.2s, background 0.2s; display: flex; justify-content: center; align-items: center; }
        .btn:active { transform: scale(0.97); background: #fff; }

        /* QULFLASH EKRANI (Xavfsizlik) */
        #lock-overlay { position: fixed; inset: 0; background: rgba(19, 19, 20, 0.95); backdrop-filter: blur(20px); z-index: 9999; display: none; flex-direction: column; align-items: center; justify-content: center; text-align: center; padding: 30px; }
        #lock-overlay h2 { color: var(--accent); margin-bottom: 16px; font-size: 2rem; }
        #lock-overlay p { color: var(--text-muted); margin-bottom: 32px; font-size: 1.1rem; line-height: 1.6; max-width: 80%; }

        /* ASOSIY QOBIQ */
        #app-shell { display: none; flex: 1; flex-direction: column; opacity: 0; transition: opacity 0.5s ease; height: 100%; }
        header { display: flex; justify-content: space-between; align-items: center; padding: 16px 24px; background: rgba(19, 19, 20, 0.8); backdrop-filter: blur(16px); border-bottom: 1px solid var(--border); z-index: 10; }
        .header-title { font-weight: 700; font-size: 1.2rem; color: var(--text-main); letter-spacing: 1px; }
        .header-user { background: var(--surface); padding: 6px 14px; border-radius: 12px; font-size: 0.95rem; color: var(--accent); font-weight: 500; }

        /* ALIFBO TO'RI (Scrollable) */
        #main-view { flex: 1; overflow-y: auto; padding: 24px; -webkit-overflow-scrolling: touch; }
        .grid-header { text-align: center; margin-bottom: 30px; font-size: 1.2rem; font-weight: 500; color: var(--text-muted); }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(75px, 1fr)); gap: 14px; max-width: 900px; margin: 0 auto; padding-bottom: 40px; }
        
        .letter-btn { background: var(--surface); border: 1px solid var(--border); border-radius: 20px; aspect-ratio: 1; display: flex; align-items: center; justify-content: center; font-size: 1.8rem; font-weight: 600; color: var(--text-main); cursor: pointer; transition: all 0.25s ease; backdrop-filter: blur(10px); opacity: 0; }
        .letter-btn:active { transform: scale(0.9); background: var(--surface-hover); border-color: var(--accent); color: var(--accent); }

        /* O'RGANISH REJIMI (FOCUS VIEW) */
        #focus-view { display: none; flex: 1; flex-direction: column; overflow-y: auto; position: relative; }
        .focus-top { padding: 16px 24px; display: flex; justify-content: space-between; align-items: center; position: sticky; top: 0; background: rgba(19, 19, 20, 0.9); backdrop-filter: blur(16px); z-index: 5; border-bottom: 1px solid rgba(255,255,255,0.03); }
        .back-btn { background: transparent; border: 1px solid var(--border); color: var(--text-main); padding: 8px 16px; border-radius: 12px; font-size: 1rem; font-weight: 500; cursor: pointer; }
        .step-badge { font-weight: 600; color: var(--bg-main); background: var(--accent); padding: 6px 14px; border-radius: 12px; font-size: 0.9rem; }

        .focus-center { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 40px 24px; }
        
        /* SO'Z KO'RINIShI */
        .word-display { font-size: clamp(3rem, 10vw, 5rem); font-weight: 700; letter-spacing: 2px; margin-bottom: 50px; display: flex; flex-wrap: wrap; justify-content: center; align-items: center; text-align: center; line-height: 1.3; }
        .syl-1 { color: #ffffff; }
        .syl-2 { color: var(--accent); } 
        .syl-3 { color: var(--success); } 
        .syl-dash { color: rgba(255,255,255,0.2); margin: 0 4px; font-weight: 400; }

        /* YOZISH QISMI */
        .type-container { position: relative; width: 100%; max-width: 360px; text-align: center; }
        .hidden-input { position: absolute; top: 0; left: 0; opacity: 0; z-index: -1; width: 1px; height: 1px; } 
        
        .visual-input { background: rgba(0,0,0,0.3); border: 1px solid var(--border); border-radius: 20px; padding: 20px; font-size: 2.2rem; font-weight: 600; color: var(--text-main); min-height: 75px; display: flex; justify-content: center; align-items: center; letter-spacing: 4px; text-transform: lowercase; transition: all 0.3s ease; backdrop-filter: blur(10px); }
        .visual-input.success { border-color: var(--success); color: var(--success); background: rgba(129, 201, 149, 0.1); box-shadow: 0 0 20px rgba(129, 201, 149, 0.15); }
        
        .cursor { display: inline-block; width: 3px; background: var(--accent); height: 2.2rem; margin-left: 6px; border-radius: 3px; animation: blink 1s step-end infinite; }
        @keyframes blink { 50% { opacity: 0; } }

        .feedback { margin-top: 20px; font-size: 1.1rem; font-weight: 600; color: var(--success); opacity: 0; transform: translateY(10px); transition: all 0.4s ease; }
        .feedback.show { opacity: 1; transform: translateY(0); }

        .focus-bottom { padding: 24px; display: flex; justify-content: center; position: sticky; bottom: 0; background: linear-gradient(to top, var(--bg-main) 70%, transparent); }
        .btn-next { background: var(--surface); color: var(--text-muted); border: 1px solid var(--border); cursor: not-allowed; width: 100%; max-width: 360px; border-radius: 16px; padding: 20px; font-size: 1.15rem; font-weight: 500; transition: all 0.3s; pointer-events: none; }
        
        .btn-next.active-gold { background: var(--gold); color: #423000; border: none; cursor: pointer; pointer-events: auto; font-weight: 700; box-shadow: 0 4px 15px rgba(253, 226, 147, 0.2); }
        .btn-next.active-gold:active { transform: scale(0.96); box-shadow: none; }

        /* Scrollbar yashirish */
        ::-webkit-scrollbar { display: none; }
        .hidden { display: none !important; }
    </style>
</head>
<body>

    <div id="lock-overlay">
        <h2>Diqqat!</h2>
        <p>Ilova o'quv jarayonini xavfsiz qilish uchun to'liq ekranda ishlashi shart.</p>
        <button class="btn glass-panel" style="max-width: 260px; color: #fff; border: 1px solid rgba(255,255,255,0.2);" onclick="enforceFullscreen()">To'liq ekranga qaytish</button>
    </div>

    <div id="welcome-view">
        <h1 class="logo-title">XOLƎRIƆ</h1>
        <p class="logo-sub">Pro Savodxonlik</p>
        
        <div class="login-box glass-panel">
            <input type="text" id="user-name" class="name-input" placeholder="Ismingizni kiriting" autocomplete="off" spellcheck="false">
            <button class="btn" onclick="startApp()">Tizimga kirish</button>
        </div>
    </div>

    <div id="app-shell">
        <header>
            <div class="header-title">XOLƎRIƆ</div>
            <div class="header-user" id="greeting-text"></div>
        </header>

        <main id="main-view">
            <div class="grid-header">Harfni tanlang</div>
            <div class="grid" id="alphabet-grid"></div>
        </main>

        <div id="focus-view">
            <div class="focus-top">
                <button class="back-btn glass-panel" onclick="exitFocus()">Ortga</button>
                <div class="step-badge" id="step-indicator">1-bosqich</div>
                <div style="width: 70px;"></div> 
            </div>
            
            <div class="focus-center" onclick="document.getElementById('hidden-input').focus()">
                <div class="word-display" id="current-word"></div>
                
                <div class="type-container">
                    <input type="text" id="hidden-input" class="hidden-input" autocomplete="off" spellcheck="false" autocorrect="off">
                    <div class="visual-input" id="visual-input">
                        <span id="typed-text"></span><span class="cursor" id="type-cursor"></span>
                    </div>
                    <div class="feedback" id="feedback">To'g'ri! Barakalla!</div>
                </div>
            </div>

            <div class="focus-bottom">
                <button class="btn btn-next" id="next-btn" onclick="nextAction()">Keyingisi</button>
            </div>
        </div>
    </div>

<script>
    // ==========================================
    // 1. PROFESSIONAL OVOZLAR (Web Audio API)
    // Internet talab qilmaydi, 0 millisekund kechikish!
    // ==========================================
    const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    
    function playTypeSound() {
        if(audioCtx.state === 'suspended') audioCtx.resume();
        const osc = audioCtx.createOscillator();
        const gainNode = audioCtx.createGain();
        osc.type = 'sine';
        osc.frequency.setValueAtTime(800, audioCtx.currentTime); // Soft click freq
        osc.frequency.exponentialRampToValueAtTime(300, audioCtx.currentTime + 0.05);
        gainNode.gain.setValueAtTime(0.3, audioCtx.currentTime);
        gainNode.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.05);
        osc.connect(gainNode);
        gainNode.connect(audioCtx.destination);
        osc.start();
        osc.stop(audioCtx.currentTime + 0.05);
    }

    function playSuccessSound() {
        if(audioCtx.state === 'suspended') audioCtx.resume();
        const freqs = [523.25, 659.25, 783.99, 1046.50]; // C Major chord (C5, E5, G5, C6)
        freqs.forEach((freq, i) => {
            const osc = audioCtx.createOscillator();
            const gainNode = audioCtx.createGain();
            osc.type = 'triangle';
            osc.frequency.value = freq;
            const startTime = audioCtx.currentTime + (i * 0.08); // Arpeggio effect
            gainNode.gain.setValueAtTime(0, startTime);
            gainNode.gain.linearRampToValueAtTime(0.2, startTime + 0.05);
            gainNode.gain.exponentialRampToValueAtTime(0.01, startTime + 0.8);
            osc.connect(gainNode);
            gainNode.connect(audioCtx.destination);
            osc.start(startTime);
            osc.stop(startTime + 0.8);
        });
    }

    // ==========================================
    // 3. QAT'IY FULLSCREEN VA 6 MARTA BOSISH (EXIT)
    // ==========================================
    let tapCount = 0;
    let lastTapTime = 0;

    // Ekranning istalgan joyiga bosilganda (klaviaturaga xalaqit bermasligi uchun input ignored)
    window.addEventListener('touchstart', (e) => {
        if(!appStarted || e.target.tagName === 'INPUT') return;
        
        let now = Date.now();
        if(now - lastTapTime < 400) { // 400ms ichida tez bosish
            tapCount++;
            if(tapCount >= 6) {
                tapCount = 0;
                forceExitFullscreen();
            }
        } else {
            tapCount = 1;
        }
        lastTapTime = now;
    });

    // Mobil bo'lmagan qurilmalar uchun click eventi
    window.addEventListener('click', (e) => {
        if(!appStarted || e.target.tagName === 'INPUT') return;
        
        let now = Date.now();
        if(now - lastTapTime < 400) {
            tapCount++;
            if(tapCount >= 6) {
                tapCount = 0;
                forceExitFullscreen();
            }
        } else {
            tapCount = 1;
        }
        lastTapTime = now;
    });

    function enforceFullscreen() {
        if(audioCtx.state === 'suspended') audioCtx.resume();
        const doc = document.documentElement;
        if (doc.requestFullscreen) { doc.requestFullscreen().catch(()=>{}); }
        else if (doc.webkitRequestFullscreen) { doc.webkitRequestFullscreen().catch(()=>{}); }
        document.getElementById('lock-overlay').style.display = 'none';
    }

    function forceExitFullscreen() {
        appStarted = false;
        if (document.exitFullscreen) { document.exitFullscreen().catch(()=>{}); }
        else if (document.webkitExitFullscreen) { document.webkitExitFullscreen().catch(()=>{}); }
        document.getElementById('lock-overlay').style.display = 'none';
        alert("🔒 Dasturdan muvaffaqiyatli chiqdingiz!");
    }

    // Brauzer orqali ruxsatsiz chiqib ketishni oldini olish
    document.addEventListener('fullscreenchange', () => {
        if(appStarted && !document.fullscreenElement) {
            document.getElementById('lock-overlay').style.display = 'flex';
        }
    });
    document.addEventListener('webkitfullscreenchange', () => {
        if(appStarted && !document.webkitFullscreenElement) {
            document.getElementById('lock-overlay').style.display = 'flex';
        }
    });

    // ==========================================
    // 4. DASTUR MANTIG'I
    // ==========================================
    function startApp() {
        const input = document.getElementById('user-name');
        if (input.value.trim() === "") { input.focus(); return; }
        
        // Ovoz tizimini faollashtirish (Browser Security)
        if(audioCtx.state === 'suspended') audioCtx.resume();
        playSuccessSound();

        appStarted = true;
        userName = input.value.trim();
        document.getElementById('greeting-text').innerText = userName;
        
        enforceFullscreen(); // Boshlash bosilganda avtomatik ekran to'lishi
        
        document.getElementById('welcome-view').style.opacity = '0';
        setTimeout(() => {
            document.getElementById('welcome-view').style.display = 'none';
            document.getElementById('app-shell').style.display = 'flex';
            setTimeout(() => document.getElementById('app-shell').style.opacity = '1', 50);
            initGrid();
        }, 400);
    }

    function initGrid() {
        const grid = document.getElementById('alphabet-grid');
        grid.innerHTML = '';
        alphabet.forEach((letter, index) => {
            let btn = document.createElement('div');
            btn.className = 'letter-btn';
            btn.style.animation = `popIn 0.4s cubic-bezier(0.34, 1.56, 0.64, 1) ${index * 0.02}s forwards`;
            btn.innerText = letter;
            btn.onclick = () => openFocus(index);
            grid.appendChild(btn);
        });
    }

    function openFocus(index) {
        currentLetterIdx = index;
        currentStep = 1;
        currentWordIdx = 0;
        
        document.getElementById('main-view').classList.add('hidden');
        document.getElementById('focus-view').style.display = 'flex';
        
        loadStepData();
    }

    function exitFocus() {
        document.getElementById('focus-view').style.display = 'none';
        document.getElementById('main-view').classList.remove('hidden');
    }

    function loadStepData() {
        let letter = alphabet[currentLetterIdx];
        document.getElementById('step-indicator').innerText = `${currentStep}-bosqich`;
        currentWordsList = db[letter][`step${currentStep}`];
        showCurrentWord();
    }

        const hiddenInput = document.getElementById('hidden-input');
        const visualInput = document.getElementById('visual-input');
        const typedText = document.getElementById('typed-text');
        const cursor = document.getElementById('type-cursor');
        const nextBtn = document.getElementById('next-btn');
        const feedback = document.getElementById('feedback');
        
        wordContainer.style.animation = 'none';
        void wordContainer.offsetWidth; // Reflow
        
        hiddenInput.value = "";
        hiddenInput.disabled = false;
        typedText.innerText = "";
        visualInput.classList.remove('success');
        cursor.style.display = 'inline-block';
        feedback.classList.remove('show');
        nextBtn.className = "btn btn-next";
        
        let word = currentWordsList[currentWordIdx];
        targetWordRaw = word.replace(/[-']/g, '').toLowerCase(); 
        
        let syllables = word.split('-');
        wordContainer.innerHTML = syllables.map((s, idx) => {
            return `<span class="syl-${(idx % 3) + 1}">${s}</span>`;
        }).join('<span class="syl-dash">-</span>');
        
        wordContainer.style.animation = 'popIn 0.5s ease forwards';
        
        setTimeout(() => hiddenInput.focus(), 100);

        if (currentWordIdx === currentWordsList.length - 1 && currentStep === 6) {
            nextBtn.innerHTML = "Ajoyib! Keyingi Harf";
        } else {
            nextBtn.innerHTML = "Keyingisi";
        }
    }

    document.getElementById('hidden-input').addEventListener('input', function(e) {
        let val = e.target.value.toLowerCase().replace(/['\s-]/g, '');
        document.getElementById('typed-text').innerText = val;
        
        playTypeSound(); // Web Audio Click

        if (val === targetWordRaw) {
            document.getElementById('visual-input').classList.add('success');
            document.getElementById('type-cursor').style.display = 'none';
            e.target.blur(); 
            
            document.getElementById('feedback').classList.add('show');
            document.getElementById('next-btn').classList.add('active-gold');
            
            playSuccessSound(); // Web Audio Chord
        }
    });

    document.getElementById('hidden-input').addEventListener('keypress', function(e) {
        if (e.key === 'Enter' && document.getElementById('visual-input').classList.contains('success')) {
            nextAction();
        }
    });

    function nextAction() {
        if (currentWordIdx < currentWordsList.length - 1) {
            currentWordIdx++;
            showCurrentWord();
        } else {
            if (currentStep < 6) {
                currentStep++;
                currentWordIdx = 0;
                playSuccessSound();
                loadStepData();
            } else {
                if (currentLetterIdx < alphabet.length - 1) {
                    currentLetterIdx++;
                    currentStep = 1;
                    currentWordIdx = 0;
                    playSuccessSound();
                    loadStepData();
                } else {
                    alert(`Barakalla ${userName}! Siz to'liq o'quv dasturini muvaffaqiyatli yakunladingiz! 🎉`);
                    exitFocus();
                }
            }
        }
    }
</script>
</body>
</html>
