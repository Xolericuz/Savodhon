<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="theme-color" content="#131314">
    <title>XOLƎRIƆ - Savodxonlik</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #131314;
            --surface: #1e1f20;
            --surface-hover: #282a2c;
            --text-main: #e3e3e3;
            --text-muted: #8e8e8e;
            --border: #333538;
            --accent: #ffffff;
        }
        
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; user-select: none; }
        body { background-color: var(--bg); color: var(--text-main); -webkit-tap-highlight-color: transparent; overflow: hidden; }
        
        /* ANIMATIONS */
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        @keyframes fadeOut { from { opacity: 1; transform: translateY(0); } to { opacity: 0; transform: translateY(-10px); } }
        .fade-in { animation: fadeIn 0.4s cubic-bezier(0.2, 0, 0, 1) forwards; }
        .fade-out { animation: fadeOut 0.3s cubic-bezier(0.2, 0, 0, 1) forwards; }

        /* WELCOME SCREEN */
        #welcome-view { position: fixed; inset: 0; display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 200; background: var(--bg); padding: 20px; }
        .logo-large { font-size: 2.5rem; font-weight: 700; letter-spacing: 3px; margin-bottom: 40px; display: flex; align-items: center; gap: 15px; color: var(--accent); }
        .logo-large img { width: 60px; height: 60px; border-radius: 12px; }
        .input-group { width: 100%; max-width: 350px; display: flex; flex-direction: column; gap: 15px; }
        .name-input { width: 100%; background: var(--surface); border: 1px solid var(--border); color: var(--text-main); padding: 18px 20px; border-radius: 16px; font-size: 1.2rem; outline: none; text-align: center; transition: 0.3s; }
        .name-input:focus { border-color: var(--text-muted); }
        .btn-enter { background: var(--text-main); color: var(--bg); padding: 18px; border-radius: 16px; font-size: 1.2rem; font-weight: 600; border: none; cursor: pointer; transition: 0.2s; }
        .btn-enter:active { transform: scale(0.97); opacity: 0.9; }

        /* MAIN APP SHELL */
        #app-shell { display: none; width: 100vw; height: 100vh; flex-direction: column; }
        
        /* HEADER */
        header { display: flex; align-items: center; justify-content: space-between; padding: 20px 25px; border-bottom: 1px solid var(--border); background: var(--bg); }
        .header-left { display: flex; align-items: center; gap: 10px; font-weight: 700; font-size: 1.2rem; letter-spacing: 1px; }
        .header-left img { width: 30px; height: 30px; border-radius: 6px; }
        .user-greeting { color: var(--text-muted); font-size: 1rem; }

        /* ALPHABET GRID */
        #main-view { flex: 1; padding: 30px 25px; overflow-y: auto; max-width: 800px; margin: 0 auto; width: 100%; }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(75px, 1fr)); gap: 15px; margin-top: 20px; }
        .letter-btn { background: var(--surface); border: 1px solid var(--border); border-radius: 16px; aspect-ratio: 1; display: flex; align-items: center; justify-content: center; font-size: 2rem; font-weight: 500; cursor: pointer; transition: 0.2s; color: var(--text-main); }
        .letter-btn:active { transform: scale(0.92); background: var(--surface-hover); }
        .letter-btn.completed { background: var(--bg); color: var(--text-muted); border-color: transparent; }

        /* FOCUS MODE */
        #focus-view { display: none; flex: 1; flex-direction: column; background: var(--bg); position: relative; }
        .focus-top { padding: 20px 25px; display: flex; justify-content: space-between; align-items: center; }
        .back-btn { background: none; border: none; color: var(--text-muted); font-size: 1.1rem; cursor: pointer; padding: 10px 0; }
        .step-badge { background: var(--surface); padding: 8px 16px; border-radius: 20px; font-size: 0.9rem; color: var(--text-muted); border: 1px solid var(--border); }

        .focus-center { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 20px; text-align: center; }
        .focus-letter-display { font-size: 2rem; color: var(--text-muted); margin-bottom: 30px; font-weight: 500; }
        
        .word-display { font-size: 4rem; font-weight: 700; letter-spacing: 2px; line-height: 1.2; width: 100%; }
        .syl-1 { color: #ffffff; }
        .syl-2 { color: #a0a0a0; }
        .syl-3 { color: #555555; }

        .focus-bottom { padding: 30px 25px; display: flex; justify-content: center; }
        .btn-next { background: var(--surface); color: var(--text-main); border: 1px solid var(--border); padding: 20px; border-radius: 20px; font-size: 1.3rem; font-weight: 600; width: 100%; max-width: 400px; cursor: pointer; transition: 0.2s; display: flex; justify-content: center; gap: 10px; }
        .btn-next:active { background: var(--surface-hover); transform: scale(0.98); }
        .btn-primary-action { background: var(--text-main); color: var(--bg); border: none; }
        .btn-primary-action:active { background: #cccccc; }
    </style>
</head>
<body>

    <div id="welcome-view">
        <div class="logo-large fade-in">
            <img src="https://ibb.co/k20gx6pX/logo.png" alt="Logo">
            XOLƎRIƆ
        </div>
        <div class="input-group fade-in" style="animation-delay: 0.1s;">
            <input type="text" id="user-name" class="name-input" placeholder="Ismingizni kiriting" autocomplete="off">
            <button class="btn-enter" onclick="startApp()">Kirish</button>
        </div>
    </div>

    <div id="app-shell">
        <header>
            <div class="header-left">
                <img src="https://ibb.co/k20gx6pX/logo.png" alt="Logo">
                XOLƎRIƆ
            </div>
            <div class="user-greeting" id="greeting-text"></div>
        </header>

        <main id="main-view">
            <h2 style="font-weight: 500; color: var(--text-muted); margin-bottom: 10px;">Qaysi harfni o'rganamiz?</h2>
            <div class="grid" id="alphabet-grid"></div>
        </main>

        <div id="focus-view">
            <div class="focus-top">
                <button class="back-btn" onclick="exitFocus()">← Orqaga</button>
                <div class="step-badge" id="step-indicator">1-qadam</div>
                <div style="width: 60px;"></div> </div>
            
            <div class="focus-center" id="word-container">
                <div class="focus-letter-display" id="focus-letter-title">Aa</div>
                <div class="word-display" id="current-word"></div>
            </div>

            <div class="focus-bottom">
                <button class="btn-next btn-primary-action" id="next-btn" onclick="nextAction()">Keyingisi →</button>
            </div>
        </div>
    </div>

    const alphabet = ["A", "B", "D", "E", "F", "G", "H", "I", "J", "K", "L", "M", "N", "O", "P", "Q", "R", "S", "T", "U", "V", "X", "Y", "Z", "O'", "G'", "Sh", "Ch", "Ng"];

    let userName = "";
    let currentLetterIdx = 0;
    let currentStep = 1;
    let currentWordIdx = 0;
    let currentWordsList = [];

    // Tizimga kirish va to'liq ekran
    function startApp() {
        const input = document.getElementById('user-name');
        if (input.value.trim() === "") {
            input.style.borderColor = "#ff4444";
            setTimeout(() => input.style.borderColor = "var(--border)", 1000);
            return;
        }
        userName = input.value.trim();
        document.getElementById('greeting-text').innerText = `Salom, ${userName}!`;
        
        // Fullscreen so'rovi
        let elem = document.documentElement;
        if (elem.requestFullscreen) { elem.requestFullscreen().catch(err=>{}); }
        else if (elem.webkitRequestFullscreen) { elem.webkitRequestFullscreen().catch(err=>{}); }
        
        document.getElementById('welcome-view').style.display = 'none';
        document.getElementById('app-shell').style.display = 'flex';
        initGrid();
    }

    function initGrid() {
        const grid = document.getElementById('alphabet-grid');
        grid.innerHTML = '';
        alphabet.forEach((letter, index) => {
            let btn = document.createElement('div');
            btn.className = 'letter-btn fade-in';
            btn.style.animationDelay = `${index * 0.02}s`;
            btn.innerText = letter;
            btn.onclick = () => openFocus(index);
            grid.appendChild(btn);
        });
    }

    function openFocus(index) {
        currentLetterIdx = index;
        currentStep = 1;
        currentWordIdx = 0;
        
        document.getElementById('main-view').style.display = 'none';
        document.getElementById('focus-view').style.display = 'flex';
        
        loadStepData();
    }

    function exitFocus() {
        document.getElementById('focus-view').style.display = 'none';
        document.getElementById('main-view').style.display = 'block';
    }

    function loadStepData() {
        let letter = alphabet[currentLetterIdx];
        document.getElementById('focus-letter-title').innerText = `${letter} ${letter.toLowerCase()}`;
        document.getElementById('step-indicator').innerText = `${currentStep}-qadam`;

        if(currentStep === 1) currentWordsList = db[letter].step1;
        if(currentStep === 2) currentWordsList = db[letter].step2;
        if(currentStep === 3) currentWordsList = db[letter].step3;

        showCurrentWord();
    }

    function showCurrentWord() {
        const wordContainer = document.getElementById('current-word');
        const nextBtn = document.getElementById('next-btn');
        
        // Animatsiya uchun eski so'zni o'chirish
        wordContainer.classList.remove('fade-in');
        void wordContainer.offsetWidth; // reflow trigger
        
        let word = currentWordsList[currentWordIdx];
        let syllables = word.split('-');
        
        // Bo'g'inlarni och-to'q rangda ajratish (Gemini style)
        let formattedHTML = syllables.map((s, idx) => {
            let colorClass = `syl-${(idx % 3) + 1}`;
            return `<span class="${colorClass}">${s}</span>`;
        }).join('<span style="color:var(--border)">-</span>');
        
        wordContainer.innerHTML = formattedHTML;
        wordContainer.classList.add('fade-in');

        // Tugma holatini o'zgartirish
        if (currentWordIdx === currentWordsList.length - 1 && currentStep === 3) {
            nextBtn.innerHTML = "Ajoyib! Keyingi harf →";
            nextBtn.classList.remove('btn-primary-action');
        } else {
            nextBtn.innerHTML = "Keyingisi →";
            nextBtn.classList.add('btn-primary-action');
        }
    }

    function nextAction() {
        if (currentWordIdx < currentWordsList.length - 1) {
            // Shu qadamdagi keyingi so'z
            currentWordIdx++;
            showCurrentWord();
        } else {
            // Qadam tugadi
            if (currentStep < 3) {
                currentStep++;
                currentWordIdx = 0;
                loadStepData();
            } else {
                // Harf butunlay tugadi, avtomatik keyingi harfga o'tish
                if (currentLetterIdx < alphabet.length - 1) {
                    currentLetterIdx++;
                    currentStep = 1;
                    currentWordIdx = 0;
                    loadStepData();
                } else {
                    // Butun alifbo tugadi
                    alert(`Barakalla ${userName}! Siz butun alifboni tugatdingiz!`);
                    exitFocus();
                }
            }
        }
    }
</script>
</body>
