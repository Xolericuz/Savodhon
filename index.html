<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="theme-color" content="#0f172a">
    <meta name="description" content="XOLƎRIƆ - Savodxonlik">
    <title>XOLƎRIƆ Savodxonlik</title>
    
    <link rel="manifest" href="manifest.json">
    <link rel="apple-touch-icon" href="icon-192x192.png">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Nunito:wght@700;800;900&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --bg-grad: linear-gradient(135deg, #0f172a 0%, #1e293b 100%);
            --surface: rgba(255, 255, 255, 0.06);
            --surface-hover: rgba(255, 255, 255, 0.12);
            --border: rgba(255, 255, 255, 0.1);
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --primary: #3b82f6;
            --success: #10b981;
            --gold: #fbbf24;
            --font-ui: 'Inter', sans-serif;
            --font-word: 'Nunito', sans-serif;
        }
        
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: var(--font-ui); user-select: none; -webkit-tap-highlight-color: transparent; }
        
        /* 100dvh mobil ekranlarda brauzer panelini hisobga oladi */
        body { background: var(--bg-grad); color: var(--text-main); height: 100dvh; width: 100vw; overflow: hidden; display: flex; flex-direction: column; }
        
        /* Chiroyli va yashirin scrollbar */
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.2); border-radius: 10px; }
        
        /* Animatsiyalar */
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        @keyframes slideUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
        @keyframes popIn { 0% { opacity: 0; transform: scale(0.85); } 100% { opacity: 1; transform: scale(1); } }
        @keyframes goldShine { 0%, 100% { box-shadow: 0 4px 15px rgba(251, 191, 36, 0.3); } 50% { box-shadow: 0 4px 25px rgba(251, 191, 36, 0.7); transform: translateY(-2px); } }

        .anim-slide { animation: slideUp 0.5s cubic-bezier(0.2, 0.8, 0.2, 1) forwards; }
        .anim-pop { animation: popIn 0.4s cubic-bezier(0.34, 1.56, 0.64, 1) forwards; }

        /* KIREK (WELCOME) EKRANI */
        #welcome-view { position: fixed; inset: 0; display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 200; background: var(--bg-grad); transition: opacity 0.4s ease, visibility 0.4s; padding: 20px; }
        .logo-box { text-align: center; margin-bottom: 40px; }
        .logo-title { font-size: 3.5rem; font-weight: 800; font-family: var(--font-word); letter-spacing: 3px; background: linear-gradient(to right, #60a5fa, #c084fc); -webkit-background-clip: text; -webkit-text-fill-color: transparent; drop-shadow: 0 10px 20px rgba(0,0,0,0.5); }
        .logo-sub { color: var(--text-muted); font-size: 1.1rem; margin-top: 5px; font-weight: 500; }
        
        .input-group { width: 100%; max-width: 320px; display: flex; flex-direction: column; gap: 15px; opacity: 0; }
        .name-input { width: 100%; background: var(--surface); border: 2px solid var(--border); color: #fff; padding: 18px; border-radius: 16px; font-size: 1.2rem; text-align: center; outline: none; transition: all 0.3s; backdrop-filter: blur(10px); }
        .name-input:focus { border-color: var(--primary); background: rgba(255,255,255,0.1); }
        
        .btn { width: 100%; background: var(--primary); color: #fff; border: none; padding: 18px; border-radius: 16px; font-size: 1.15rem; font-weight: 600; cursor: pointer; transition: all 0.2s; display: flex; justify-content: center; align-items: center; gap: 8px; box-shadow: 0 4px 15px rgba(59, 130, 246, 0.3); }
        .btn:active { transform: scale(0.96); box-shadow: none; }
        .btn-install { background: transparent; border: 2px solid var(--border); color: var(--text-main); display: none; box-shadow: none; }
        .btn-install.show { display: flex; }

        /* QULFLASH EKRANI */
        #lock-overlay { position: fixed; inset: 0; background: rgba(15, 23, 42, 0.98); backdrop-filter: blur(15px); z-index: 9999; display: none; flex-direction: column; align-items: center; justify-content: center; text-align: center; padding: 30px; }
        #lock-overlay h2 { color: #fff; margin-bottom: 15px; font-size: 1.8rem; }
        #lock-overlay p { color: var(--text-muted); margin-bottom: 30px; font-size: 1.1rem; line-height: 1.5; }

        /* ASOSIY QOBIQ VA HEADER */
        #app-shell { display: none; flex: 1; flex-direction: column; opacity: 0; transition: opacity 0.5s ease; height: 100%; }
        header { display: flex; justify-content: space-between; align-items: center; padding: 15px 25px; border-bottom: 1px solid var(--border); background: rgba(15, 23, 42, 0.7); backdrop-filter: blur(12px); z-index: 10; }
        .header-title { font-weight: 800; font-size: 1.3rem; font-family: var(--font-word); color: #fff; letter-spacing: 1px; }
        .header-user { background: var(--surface); padding: 6px 14px; border-radius: 12px; font-size: 0.95rem; font-weight: 600; color: #93c5fd; border: 1px solid var(--border); }

        /* ALIFBO TO'RI (Ajoyib scroll va kichik harflar bilan) */
        #main-view { flex: 1; overflow-y: auto; overflow-x: hidden; padding: 25px 20px 40px 20px; -webkit-overflow-scrolling: touch; }
        .main-container { max-width: 800px; margin: 0 auto; }
        .grid-header { text-align: center; margin-bottom: 25px; }
        .grid-header h2 { font-size: 1.3rem; font-weight: 600; color: var(--text-muted); }
        
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(70px, 1fr)); gap: 12px; }
        .letter-btn { background: var(--surface); border: 1px solid var(--border); border-radius: 16px; aspect-ratio: 1; display: flex; align-items: center; justify-content: center; font-size: 1.7rem; font-weight: 800; font-family: var(--font-word); color: var(--text-main); cursor: pointer; transition: all 0.2s ease; opacity: 0; backdrop-filter: blur(5px); }
        .letter-btn:active { transform: scale(0.88); background: var(--surface-hover); border-color: var(--primary); }

        /* O'RGANISH REJIMI (FOCUS VIEW) */
        #focus-view { display: none; flex: 1; flex-direction: column; overflow-y: auto; -webkit-overflow-scrolling: touch; position: relative; }
        .focus-top { padding: 20px 25px; display: flex; justify-content: space-between; align-items: center; position: sticky; top: 0; background: var(--bg-grad); z-index: 5; border-bottom: 1px solid rgba(255,255,255,0.05); }
        .back-btn { background: var(--surface); border: 1px solid var(--border); color: #fff; padding: 10px 18px; border-radius: 12px; font-weight: 600; cursor: pointer; display: flex; align-items: center; transition: background 0.2s; }
        .back-btn:active { background: rgba(255,255,255,0.1); }
        .step-badge { font-weight: 700; color: #60a5fa; background: rgba(59, 130, 246, 0.15); padding: 8px 16px; border-radius: 12px; border: 1px solid rgba(59, 130, 246, 0.3); }

        .focus-center { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 30px 20px 10vh 20px; min-height: max-content; }
        
        /* SO'Z KO'RINIShI */
        .word-display { font-family: var(--font-word); font-size: clamp(3rem, 10vw, 5.5rem); font-weight: 900; letter-spacing: 1px; margin-bottom: 40px; display: flex; flex-wrap: wrap; justify-content: center; align-items: center; text-align: center; line-height: 1.2; }
        .syl-1 { color: #ffffff; }
        .syl-2 { color: #93c5fd; } 
        .syl-3 { color: #6ee7b7; } 
        .syl-dash { color: rgba(255,255,255,0.15); margin: 0 4px; font-weight: 400; }

        /* YOZISH QISMI */
        .type-container { position: relative; width: 100%; max-width: 350px; text-align: center; }
        .hidden-input { position: absolute; opacity: 0; pointer-events: none; z-index: -1; width: 100%; height: 100%; } 
        
        .visual-input { font-family: var(--font-word); font-size: 2.2rem; font-weight: 800; color: #fff; min-height: 60px; border-bottom: 3px solid rgba(255,255,255,0.2); padding-bottom: 8px; transition: all 0.3s; letter-spacing: 3px; text-transform: lowercase; display: flex; justify-content: center; align-items: center; }
        .visual-input.success { border-bottom-color: var(--success); color: var(--success); }
        
        .cursor { display: inline-block; width: 3px; background: var(--primary); height: 2.2rem; margin-left: 5px; animation: blink 1s step-end infinite; border-radius: 2px; }
        @keyframes blink { 50% { opacity: 0; } }

        .feedback { margin-top: 15px; font-size: 1.1rem; font-weight: 700; color: var(--success); opacity: 0; transform: translateY(10px); transition: all 0.3s; }
        .feedback.show { opacity: 1; transform: translateY(0); }

        .focus-bottom { padding: 25px; display: flex; justify-content: center; position: sticky; bottom: 0; background: linear-gradient(to top, #0f172a 60%, transparent); }
        .btn-next { background: var(--surface); color: var(--text-muted); border: 1px solid var(--border); cursor: not-allowed; max-width: 350px; border-radius: 16px; padding: 20px; font-size: 1.2rem; transition: all 0.3s; }
        
        .btn-next.active-gold { background: var(--gold); color: #78350f; border: none; cursor: pointer; animation: goldShine 2s infinite; font-weight: 800; }
        .btn-next.active-gold:active { transform: scale(0.95); animation: none; box-shadow: none; }
        
        .hidden { display: none !important; }
    </style>
</head>
<body>

    <div id="lock-overlay">
        <h2>Diqqat!</h2>
        <p>O'qish jarayoni buzilmasligi uchun to'liq ekranga o'ting.</p>
        <button class="btn" style="max-width: 250px;" onclick="enterFullscreen()">Davom etish</button>
    </div>

    <div id="welcome-view">
        <div class="logo-box anim-slide">
            <h1 class="logo-title">XOLƎRIƆ</h1>
            <p class="logo-sub">Mukammal savodxonlik</p>
        </div>
        <div class="input-group anim-slide" style="animation-delay: 0.1s; opacity: 1;">
            <input type="text" id="user-name" class="name-input" placeholder="Ismingizni yozing" autocomplete="off" spellcheck="false">
            <button class="btn" onclick="startApp()">Boshlash</button>
            <button class="btn btn-install" id="install-btn">Ilovani o'rnatish</button>
        </div>
    </div>

    <div id="app-shell">
        <header>
            <div class="header-title">XOLƎRIƆ</div>
            <div class="header-user" id="greeting-text"></div>
        </header>

        <main id="main-view">
            <div class="main-container">
                <div class="grid-header">
                    <h2>Qaysi harfni o'rganamiz?</h2>
                </div>
                <div class="grid" id="alphabet-grid"></div>
            </div>
        </main>

        <div id="focus-view">
            <div class="focus-top">
                <button class="back-btn" onclick="exitFocus()">← Ortga</button>
                <div class="step-badge" id="step-indicator">1-bosqich</div>
                <div style="width: 80px;"></div> 
            </div>
            
            <div class="focus-center" onclick="focusHiddenInput()">
                <div class="word-display" id="current-word"></div>
                
                <div class="type-container">
                    <input type="text" id="hidden-input" class="hidden-input" autocomplete="off" spellcheck="false" autocorrect="off">
                    <div class="visual-input" id="visual-input">
                        <span id="typed-text"></span><span class="cursor" id="type-cursor"></span>
                    </div>
                    <div class="feedback" id="feedback">To'g'ri yozdingiz!</div>
                </div>
            </div>

            <div class="focus-bottom">
                <button class="btn btn-next" id="next-btn" onclick="nextAction()">Keyingisi</button>
            </div>
        </div>
    </div>

    const alphabet = Object.keys(db);
    let userName = "";
    let currentLetterIdx = 0;
    let currentStep = 1;
    let currentWordIdx = 0;
    let currentWordsList = [];
    let targetWordRaw = "";
    let appStarted = false;

    // --- PWA O'RNATISH TIZIMI ---
    let deferredPrompt;
    window.addEventListener('beforeinstallprompt', (e) => {
        e.preventDefault();
        deferredPrompt = e;
        document.getElementById('install-btn').classList.add('show');
    });

    document.getElementById('install-btn').addEventListener('click', async () => {
        if (deferredPrompt) {
            deferredPrompt.prompt();
            const { outcome } = await deferredPrompt.userChoice;
            if (outcome === 'accepted') {
                document.getElementById('install-btn').classList.remove('show');
            }
            deferredPrompt = null;
        }
    });

    // --- FULLSCREEN VA 6 MARTA BOSISH TIZIMI ---
    let tapCount = 0;
    let lastTapTime = 0;

    document.addEventListener('click', (e) => {
        if(!appStarted) return;
        let now = new Date().getTime();
        if(now - lastTapTime < 500) {
            tapCount++;
            if(tapCount >= 6) {
                forceExitFullscreen();
                tapCount = 0;
            }
        } else {
            tapCount = 1;
        }
        lastTapTime = now;
    });

    function enterFullscreen() {
        const doc = document.documentElement;
        if (doc.requestFullscreen) { doc.requestFullscreen().catch(()=>{}); }
        else if (doc.webkitRequestFullscreen) { doc.webkitRequestFullscreen().catch(()=>{}); }
        document.getElementById('lock-overlay').style.display = 'none';
    }

    function forceExitFullscreen() {
        appStarted = false;
        if (document.exitFullscreen) { document.exitFullscreen(); }
        else if (document.webkitExitFullscreen) { document.webkitExitFullscreen(); }
        alert("To'liq ekrandan chiqdingiz!");
    }

    document.addEventListener('fullscreenchange', () => {
        if(appStarted && !document.fullscreenElement) {
            document.getElementById('lock-overlay').style.display = 'flex';
        }
    });

    // --- DASTURNI BOSHLASH ---
    function startApp() {
        const input = document.getElementById('user-name');
        if (input.value.trim() === "") {
            input.focus();
            return;
        }
        
        appStarted = true;
        userName = input.value.trim();
        document.getElementById('greeting-text').innerText = userName;
        enterFullscreen();
        
        const welcomeView = document.getElementById('welcome-view');
        const appShell = document.getElementById('app-shell');
        
        welcomeView.style.opacity = '0';
        setTimeout(() => {
            welcomeView.style.display = 'none';
            appShell.style.display = 'flex';
            setTimeout(() => appShell.style.opacity = '1', 50);
            initGrid();
        }, 400);
    }

    function initGrid() {
        const grid = document.getElementById('alphabet-grid');
        grid.innerHTML = '';
        alphabet.forEach((letter, index) => {
            let btn = document.createElement('div');
            btn.className = 'letter-btn anim-pop';
            btn.style.animationDelay = `${index * 0.02}s`;
            btn.innerText = letter;
            btn.onclick = () => openFocus(index);
            grid.appendChild(btn);
        });
    }

    function openFocus(index) {
        currentLetterIdx = index;
        currentStep = 1;
        currentWordIdx = 0;
        
        document.getElementById('main-view').classList.add('hidden');
        const focusView = document.getElementById('focus-view');
        focusView.style.display = 'flex';
        
        loadStepData();
    }

    function exitFocus() {
        document.getElementById('focus-view').style.display = 'none';
        document.getElementById('main-view').classList.remove('hidden');
    }

    function loadStepData() {
        let letter = alphabet[currentLetterIdx];
        document.getElementById('step-indicator').innerText = `${currentStep}-bosqich`;
        currentWordsList = db[letter][`step${currentStep}`];
        showCurrentWord();
    }

    function showCurrentWord() {
        const wordContainer = document.getElementById('current-word');
        const hiddenInput = document.getElementById('hidden-input');
        const visualInput = document.getElementById('visual-input');
        const typedText = document.getElementById('typed-text');
        const cursor = document.getElementById('type-cursor');
        const nextBtn = document.getElementById('next-btn');
        const feedback = document.getElementById('feedback');
        
        wordContainer.classList.remove('anim-pop');
        void wordContainer.offsetWidth; 
        
        hiddenInput.value = "";
        hiddenInput.disabled = false;
        typedText.innerText = "";
        visualInput.classList.remove('success');
        cursor.style.display = 'inline-block';
        feedback.classList.remove('show');
        nextBtn.className = "btn btn-next";
        
        let word = currentWordsList[currentWordIdx];
        targetWordRaw = word.replace(/[-']/g, '').toLowerCase(); 
        
        let syllables = word.split('-');
        wordContainer.innerHTML = syllables.map((s, idx) => {
            return `<span class="syl-${(idx % 3) + 1}">${s}</span>`;
        }).join('<span class="syl-dash">-</span>');
        
        wordContainer.classList.add('anim-pop');
        
        // Scrollni pastga moslash (klaviatura ochilganda qulay bo'lishi uchun)
        setTimeout(() => {
            focusHiddenInput();
            document.getElementById('focus-view').scrollTo({ top: document.body.scrollHeight, behavior: 'smooth' });
        }, 100);

        if (currentWordIdx === currentWordsList.length - 1 && currentStep === 6) {
            nextBtn.innerHTML = "Ajoyib! Keyingi Harf →";
        } else {
            nextBtn.innerHTML = "Keyingisi →";
        }
    }

    function focusHiddenInput() {
        document.getElementById('hidden-input').focus();
    }

    // Yozish logikasi
    document.getElementById('hidden-input').addEventListener('input', function(e) {
        let val = e.target.value.toLowerCase().replace(/['\s-]/g, '');
        document.getElementById('typed-text').innerText = val;
        sounds.type.currentTime = 0;
        sounds.type.play().catch(()=>{});

        if (val === targetWordRaw) {
            document.getElementById('visual-input').classList.add('success');
            document.getElementById('type-cursor').style.display = 'none';
            e.target.blur(); 
            
            document.getElementById('feedback').classList.add('show');
            document.getElementById('next-btn').classList.add('active-gold');
            
            sounds.success.currentTime = 0;
            sounds.success.play().catch(()=>{});
        }
    });

    document.getElementById('hidden-input').addEventListener('keypress', function(e) {
        if (e.key === 'Enter' && document.getElementById('visual-input').classList.contains('success')) {
            nextAction();
        }
    });

    function nextAction() {
        if (currentWordIdx < currentWordsList.length - 1) {
            currentWordIdx++;
            showCurrentWord();
        } else {
            if (currentStep < 6) {
                currentStep++;
                currentWordIdx = 0;
                sounds.levelUp.currentTime = 0;
                sounds.levelUp.play().catch(()=>{});
                loadStepData();
            } else {
                if (currentLetterIdx < alphabet.length - 1) {
                    currentLetterIdx++;
                    currentStep = 1;
                    currentWordIdx = 0;
                    sounds.levelUp.play().catch(()=>{});
                    loadStepData();
                } else {
                    alert(`Barakalla! Barcha harflarni muvaffaqiyatli tugatdingiz!`);
                    exitFocus();
                }
            }
        }
    }

    // Service Worker
    if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
            navigator.serviceWorker.register('sw.js').catch(err => console.log(err));
        });
    }
</script>
</body>
</html>
