<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="theme-color" content="#09090b">
    <title>XOLƎRIƆ Nano</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --bg: #09090b;
            --card: rgba(24, 24, 27, 0.6);
            --glass: rgba(255, 255, 255, 0.03);
            --glass-border: rgba(255, 255, 255, 0.08);
            --accent: #3b82f6;
            --accent-glow: rgba(59, 130, 246, 0.5);
            --text: #fafafa;
            --text-dim: #a1a1aa;
            --success: #22c55e;
            --gold: #f59e0b;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; -webkit-tap-highlight-color: transparent; outline: none; }
        
        body { background-color: var(--bg); color: var(--text); height: 100dvh; width: 100vw; overflow: hidden; display: flex; flex-direction: column; }

        /* Glassmorphism Classes */
        .glass { background: var(--glass); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px); border: 1px solid var(--glass-border); border-radius: 20px; }
        .glass-btn { background: var(--glass); border: 1px solid var(--glass-border); color: var(--text); backdrop-filter: blur(10px); cursor: pointer; transition: 0.3s; }
        .glass-btn:active { transform: scale(0.95); background: rgba(255,255,255,0.1); }

        /* Animations */
        @keyframes slideUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
        @keyframes pulseAccent { 0% { box-shadow: 0 0 0 0 var(--accent-glow); } 70% { box-shadow: 0 0 20px 10px rgba(59, 130, 246, 0); } 100% { box-shadow: 0 0 0 0 rgba(59, 130, 246, 0); } }

        /* 1. WELCOME VIEW */
        #welcome-view { position: fixed; inset: 0; z-index: 500; background: var(--bg); display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 20px; transition: 0.6s cubic-bezier(0.4, 0, 0.2, 1); }
        .logo-container { text-align: center; margin-bottom: 50px; }
        .logo-text { font-size: 4rem; font-weight: 800; letter-spacing: -2px; background: linear-gradient(to bottom, #fff, #71717a); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .login-card { width: 100%; max-width: 360px; padding: 30px; animation: slideUp 0.8s ease; }
        .main-input { width: 100%; background: rgba(0,0,0,0.3); border: 1px solid var(--glass-border); border-radius: 12px; padding: 16px; color: #fff; font-size: 1.1rem; text-align: center; margin-bottom: 20px; transition: 0.3s; }
        .main-input:focus { border-color: var(--accent); box-shadow: 0 0 15px var(--accent-glow); }

        /* 2. LOCK OVERLAY */
        #lock-overlay { position: fixed; inset: 0; z-index: 9999; background: rgba(0,0,0,0.9); backdrop-filter: blur(30px); display: none; flex-direction: column; align-items: center; justify-content: center; text-align: center; padding: 40px; }

        /* 3. MAIN APP SHELL */
        #app-shell { display: none; flex: 1; flex-direction: column; height: 100%; opacity: 0; transition: 0.5s; }
        header { display: flex; justify-content: space-between; align-items: center; padding: 20px 24px; border-bottom: 1px solid var(--glass-border); }
        .xp-badge { background: linear-gradient(45deg, #fbbf24, #f59e0b); color: #000; padding: 4px 12px; border-radius: 20px; font-weight: 700; font-size: 0.8rem; }

        /* ALPHABET GRID */
        #main-view { flex: 1; overflow-y: auto; padding: 24px; scrollbar-width: none; }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(80px, 1fr)); gap: 12px; max-width: 900px; margin: 0 auto; }
        .letter-card { aspect-ratio: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; font-size: 1.8rem; font-weight: 700; position: relative; overflow: hidden; }
        .letter-progress { position: absolute; bottom: 0; left: 0; height: 4px; background: var(--accent); transition: width 0.5s; }

        /* 4. FOCUS VIEW */
        #focus-view { display: none; flex: 1; flex-direction: column; position: relative; }
        .focus-header { padding: 15px 24px; display: flex; justify-content: space-between; align-items: center; }
        .word-area { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 20px; }
        
        .word-box { font-size: clamp(3.5rem, 12vw, 6rem); font-weight: 800; text-align: center; margin-bottom: 40px; text-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        .syl-vocal { color: #fff; }
        .syl-accent { color: var(--accent); }
        .syl-dash { opacity: 0.2; margin: 0 5px; }

        /* INPUT SYSTEM */
        .input-display { width: 100%; max-width: 400px; height: 100px; display: flex; align-items: center; justify-content: center; font-size: 3rem; font-weight: 700; letter-spacing: 5px; color: var(--accent); border-radius: 24px; position: relative; transition: 0.3s; }
        .input-display.success { color: var(--success); text-shadow: 0 0 20px var(--success); }
        .cursor { width: 4px; height: 3.5rem; background: var(--accent); margin-left: 8px; animation: blink 1s infinite; border-radius: 2px; }
        @keyframes blink { 50% { opacity: 0; } }

        .hidden-input { position: absolute; opacity: 0; pointer-events: none; }

        .next-btn { margin: 30px 24px; padding: 22px; border-radius: 18px; font-size: 1.3rem; font-weight: 700; text-align: center; pointer-events: none; opacity: 0.3; }
        .next-btn.ready { opacity: 1; pointer-events: auto; background: var(--text); color: var(--bg); animation: pulseAccent 2s infinite; }

        /* Scrollbar yashirish */
        ::-webkit-scrollbar { display: none; }
        .hidden { display: none !important; }
    </style>
</head>
<body>

    <div id="lock-overlay">
        <h2 style="font-size: 2.5rem; margin-bottom: 10px;">🔒</h2>
        <h2 style="margin-bottom: 15px;">Tizim bloklandi</h2>
        <p style="color: var(--text-dim); margin-bottom: 30px;">Dasturdan ruxsatsiz chiqishga harakat qilindi. O'qishni davom ettirish uchun tugmani bosing.</p>
        <button class="glass-btn" style="padding: 18px 40px; border-radius: 15px; font-weight: 600;" onclick="requestFull()">To'liq ekranga qaytish</button>
    </div>

    <div id="welcome-view">
        <div class="logo-container">
            <div class="logo-text">XOLƎRIƆ</div>
            <p style="color: var(--accent); font-weight: 600; letter-spacing: 4px;">Nano</p>
        </div>
        <div class="login-card glass">
            <input type="text" id="user-name" class="main-input" placeholder="Ismingizni kiriting" autocomplete="off">
            <button class="btn" style="width: 100%; padding: 18px; border-radius: 12px; background: #fff; color: #000; font-weight: 700; border: none; cursor: pointer;" onclick="startEngine()">BOSHLASH</button>
        </div>
    </div>

    <div id="app-shell">
        <header>
            <div style="font-weight: 800; font-size: 1.2rem;">XOLƎRIƆ <span style="color: var(--accent);">●</span></div>
            <div style="display: flex; align-items: center; gap: 10px;">
                <span id="header-user" style="font-weight: 500; font-size: 0.9rem; color: var(--text-dim);">foydalanuvchi</span>
                <div class="xp-badge">XP <span id="xp-val">0</span></div>
            </div>
        </header>

        <main id="main-view">
            <div class="grid-header" style="margin-bottom: 20px; color: var(--text-dim); font-weight: 500;">O'rganish uchun harfni tanlang:</div>
            <div class="grid" id="alphabet-grid"></div>
        </main>

        <div id="focus-view">
            <div class="focus-header">
                <button class="glass-btn" style="padding: 8px 16px; border-radius: 10px;" onclick="closeFocus()">← CHIQISH</button>

                <button class="glass-btn" style="padding: 8px; border-radius: 50%; width: 40px; height: 40px;" onclick="speakWord()">🔊</button>
            </div>
            
            <div class="word-area" onclick="focusInput()">

                <div class="input-display glass" id="visual-box">
                    <span id="typed-mirror"></span><span class="cursor" id="cursor"></span>
                </div>
                
                <div id="success-msg" class="feedback" style="margin-top: 20px; color: var(--success); font-weight: 700; opacity: 0;">BARAKALLA! +10 XP</div>
            </div>

            <input type="text" id="master-input" class="hidden-input" autocomplete="off" spellcheck="false">
            
            <button class="next-btn" id="next-btn" onclick="goNext()">KEYINGISI →</button>
        </div>
    </div>

<script>
    // --- AUDIO SYSTEM (NEURAL) ---
    const audio = {
        type: () => playTone(600, 0.05, 'sine'),
        success: () => {
            playTone(523.25, 0.1, 'triangle');
            setTimeout(() => playTone(659.25, 0.1, 'triangle'), 100);
            setTimeout(() => playTone(783.99, 0.2, 'triangle'), 200);
        }
    };

    function playTone(freq, dur, type) {
        const ctx = new (window.AudioContext || window.webkitAudioContext)();
        const osc = ctx.createOscillator();
        const g = ctx.createGain();
        osc.type = type;
        osc.frequency.value = freq;
        g.gain.setValueAtTime(0.1, ctx.currentTime);
        g.gain.exponentialRampToValueAtTime(0.0001, ctx.currentTime + dur);
        osc.connect(g);
        g.connect(ctx.destination);
        osc.start();
        osc.stop(ctx.currentTime + dur);
    }

        const text = currentWord.replace(/[-]/g, '');

    let userXP = parseInt(localStorage.getItem('xp')) || 0;

    let currentLetter = "";
    let currentStep = 1;
    let currentWordIdx = 0;
    let currentWord = "";
    let targetClean = "";

    // --- ENGINE CORE ---
    function startEngine() {
        const name = document.getElementById('user-name').value.trim();
        if(!name) return;
        
        userName = name;
        document.getElementById('header-user').innerText = userName.toUpperCase();
        document.getElementById('xp-val').innerText = userXP;
        
        requestFull();
        appStarted = true;
        
        document.getElementById('welcome-view').style.opacity = '0';
        setTimeout(() => {
            document.getElementById('welcome-view').style.display = 'none';
            document.getElementById('app-shell').style.display = 'flex';
            setTimeout(() => document.getElementById('app-shell').style.opacity = '1', 50);
            renderGrid();
        }, 600);
    }

    function renderGrid() {
        const grid = document.getElementById('alphabet-grid');
        grid.innerHTML = '';
        Object.keys(db).forEach(char => {
            const card = document.createElement('div');
            card.className = 'letter-card glass';
            card.innerText = char;
            
            const progVal = progress[char] || 0;
            const bar = document.createElement('div');
            bar.className = 'letter-progress';
            bar.style.width = `${progVal}%`;
            card.appendChild(bar);
            
            card.onclick = () => openLetter(char);
            grid.appendChild(card);
        });
    }

    function openLetter(char) {
        currentLetter = char;
        currentStep = 1;
        currentWordIdx = 0;
        document.getElementById('main-view').classList.add('hidden');
        document.getElementById('focus-view').style.display = 'flex';
        loadWord();
    }

    function closeFocus() {
        document.getElementById('focus-view').style.display = 'none';
        document.getElementById('main-view').classList.remove('hidden');
        renderGrid();
    }

    function loadWord() {
        const list = db[currentLetter][`step${currentStep}`];
        currentWord = list[currentWordIdx];
        targetClean = currentWord.replace(/[-']/g, '').toLowerCase();
        
        document.getElementById('step-label').innerText = `${currentStep}-BOSQICH`;
        const box = document.getElementById('word-target');
        const syls = currentWord.split('-');
        box.innerHTML = syls.map((s, i) => `<span class="${i%2==0?'syl-vocal':'syl-accent'}">${s}</span>`).join('<span class="syl-dash">-</span>');
        
        // Reset Input
        document.getElementById('master-input').value = '';
        document.getElementById('typed-mirror').innerText = '';
        document.getElementById('visual-box').classList.remove('success');
        document.getElementById('success-msg').style.opacity = '0';
        document.getElementById('next-btn').classList.remove('ready');
        document.getElementById('cursor').style.display = 'inline-block';
        
        speakWord();
        focusInput();
    }

    function focusInput() {
        document.getElementById('master-input').focus();
    }

    document.getElementById('master-input').addEventListener('input', (e) => {
        const val = e.target.value.toLowerCase();
        document.getElementById('typed-mirror').innerText = val;
        audio.type();
        
        if(val.replace(/['\s-]/g, '') === targetClean) {
            handleSuccess();
        }
    });

    function handleSuccess() {
        audio.success();
        document.getElementById('visual-box').classList.add('success');
        document.getElementById('cursor').style.display = 'none';
        document.getElementById('success-msg').style.opacity = '1';
        document.getElementById('next-btn').classList.add('ready');
        
        userXP += 10;
        document.getElementById('xp-val').innerText = userXP;
        localStorage.setItem('xp', userXP);
        
        // Progress calc
        const totalInLetter = 36; // 6 steps * 6 words
        const currentTotal = ((currentStep-1)*6) + (currentWordIdx + 1);
        const percent = Math.floor((currentTotal / totalInLetter) * 100);
        progress[currentLetter] = Math.max(progress[currentLetter] || 0, percent);
        localStorage.setItem('progress', JSON.stringify(progress));
    }

    function goNext() {
        currentWordIdx++;
        if(currentWordIdx >= 6) {
            currentWordIdx = 0;
            currentStep++;
        }
        
        if(currentStep > 6) {
            alert("Ajoyib! Bu harfni to'liq o'zlashtirdingiz!");
            closeFocus();
        } else {
            loadWord();
        }
    }

    // --- SECURITY & FULLSCREEN ---
    let taps = 0, lastTap = 0;
    window.addEventListener('touchstart', (e) => {
        if(!appStarted || e.target.tagName === 'INPUT') return;
        const now = Date.now();
        if(now - lastTap < 400) taps++; else taps = 1;
        lastTap = now;
        if(taps >= 6) { exitApp(); taps = 0; }
    });

    function requestFull() {
        const de = document.documentElement;
        if(de.requestFullscreen) de.requestFullscreen();
        else if(de.webkitRequestFullscreen) de.webkitRequestFullscreen();
        document.getElementById('lock-overlay').style.display = 'none';
    }

    function exitApp() {
        appStarted = false;
        if(document.exitFullscreen) document.exitFullscreen();
        alert("XOLƎRIƆ seansni yakunladi.");
    }

    document.addEventListener('fullscreenchange', () => {
        if(appStarted && !document.fullscreenElement) document.getElementById('lock-overlay').style.display = 'flex';
    });
</script>
