    <style>
        :root {
            --bg: #09090b;
            --surface: rgba(24, 24, 27, 0.7);
            --glass: rgba(255, 255, 255, 0.03);
            --border: rgba(255, 255, 255, 0.08);
            --accent: #4f46e5;
            --accent-glow: rgba(79, 70, 229, 0.4);
            --text: #f4f4f5;
            --text-dim: #71717a;
            --success: #10b981;
            --gold: #fbbf24;
            --font: 'Plus Jakarta Sans', sans-serif;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: var(--font); user-select: none; -webkit-tap-highlight-color: transparent; outline: none; }
        
        body { background-color: var(--bg); color: var(--text); height: 100dvh; width: 100vw; overflow: hidden; display: flex; flex-direction: column; overscroll-behavior-y: none; }

        .glass { background: var(--glass); backdrop-filter: blur(24px); -webkit-backdrop-filter: blur(24px); border: 1px solid var(--border); }
        
        @keyframes fadeIn { from { opacity: 0; transform: scale(0.95); } to { opacity: 1; transform: scale(1); } }
        @keyframes successPop { 0% { transform: scale(1); } 50% { transform: scale(1.05); } 100% { transform: scale(1); } }
        @keyframes blink { 50% { opacity: 0; } }

        /* 1. WELCOME SECTION */
        #welcome-view { position: fixed; inset: 0; z-index: 1000; background: var(--bg); display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 24px; transition: opacity 0.6s ease; }
        .brand-logo { font-size: 3.5rem; font-weight: 800; letter-spacing: -2px; margin-bottom: 8px; background: linear-gradient(to bottom, #fff, #52525b); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .login-card { width: 100%; max-width: 380px; padding: 40px 30px; border-radius: 32px; text-align: center; }
        .name-input { width: 100%; background: rgba(0,0,0,0.4); border: 1px solid var(--border); border-radius: 16px; padding: 18px; color: #fff; font-size: 1.2rem; text-align: center; margin-bottom: 24px; transition: 0.3s; }
        .name-input:focus { border-color: var(--accent); }

        /* 2. MAIN DASHBOARD */
        #app-shell { display: none; flex: 1; flex-direction: column; height: 100%; opacity: 0; transition: 0.5s; }
        header { display: flex; justify-content: space-between; align-items: center; padding: env(safe-area-inset-top, 20px) 24px 20px 24px; border-bottom: 1px solid var(--border); background: rgba(9, 9, 11, 0.5); backdrop-filter: blur(10px); }
        .xp-chip { background: var(--gold); color: #451a03; padding: 6px 14px; border-radius: 100px; font-weight: 800; font-size: 0.85rem; display: flex; align-items: center; gap: 6px; }

        /* 3. ALPHABET HUB */
        #hub-view { flex: 1; overflow-y: auto; padding: 24px; scrollbar-width: none; }
        .hub-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(80px, 1fr)); gap: 14px; max-width: 900px; margin: 0 auto; padding-bottom: 100px; }
        .letter-tile { aspect-ratio: 1; border-radius: 24px; display: flex; flex-direction: column; align-items: center; justify-content: center; font-size: 1.8rem; font-weight: 700; position: relative; transition: 0.2s; cursor: pointer; }
        .letter-tile:active { transform: scale(0.9); }
        .tile-progress { position: absolute; bottom: 10px; width: 40px; height: 4px; background: rgba(255,255,255,0.1); border-radius: 2px; overflow: hidden; }
        .tile-progress-fill { height: 100%; background: var(--accent); width: 0%; transition: width 0.4s; }

        /* 4. FOCUS LEARNING (BOSQICH) - YUQORIGA SURILDI */
        #focus-view { display: none; flex: 1; flex-direction: column; position: relative; }
        .focus-nav { padding: 16px 24px; display: flex; justify-content: space-between; align-items: center; }
        .step-label { color: var(--accent); font-weight: 800; font-size: 0.9rem; letter-spacing: 2px; }
        
        /* Klaviatura yopib qo'ymasligi uchun flex-start va padding-top berildi */
        .learning-core { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: flex-start; padding: 8vh 24px 24px 24px; }
        .target-word { font-size: clamp(3rem, 10vw, 5.5rem); font-weight: 800; margin-bottom: 30px; text-align: center; line-height: 1.1; }
        .vocal { color: #fff; }
        .consonant { color: var(--accent); }
        .dash { opacity: 0.15; padding: 0 4px; }

        /* INPUT SYSTEM */
        .input-wrapper { position: relative; width: 100%; max-width: 420px; }
        .mirror-field { min-height: 80px; border-radius: 24px; display: flex; align-items: center; justify-content: center; font-size: 2.4rem; font-weight: 700; letter-spacing: 4px; color: var(--text); position: relative; border: 2px solid var(--border); transition: 0.3s; background: rgba(0,0,0,0.5); }
        .mirror-field.match { border-color: var(--success); color: var(--success); text-shadow: 0 0 20px rgba(16,185,129,0.3); animation: successPop 0.4s ease; }
        .cursor { width: 4px; height: 3rem; background: var(--accent); margin-left: 10px; animation: blink 1s infinite; border-radius: 4px; }
        
        /* Klaviaturani chaqirish uchun input (ko'rinmas) */
        #hidden-input { position: absolute; top: -50px; opacity: 0; pointer-events: none; }

        .btn-next { margin: 15px 24px 24px 24px; padding: 18px; border-radius: 20px; font-size: 1.1rem; font-weight: 800; text-align: center; transition: 0.4s; opacity: 0.2; pointer-events: none; background: var(--text); color: var(--bg); border: none; z-index: 10;}
        .btn-next.active { opacity: 1; pointer-events: auto; transform: translateY(-3px); box-shadow: 0 15px 30px rgba(0,0,0,0.4); cursor: pointer; }

        #guard-overlay { position: fixed; inset: 0; z-index: 2000; background: rgba(0,0,0,0.95); backdrop-filter: blur(40px); display: none; flex-direction: column; align-items: center; justify-content: center; text-align: center; padding: 40px; }

        ::-webkit-scrollbar { display: none; }
        .hidden { display: none !important; }

<script>
    // --- APP INITIALIZATION & LOCALSTORAGE ---
    window.addEventListener('DOMContentLoaded', () => {
        // Avval kiritilgan ismni xotiradan olish
        const savedName = localStorage.getItem('xoleric_username');
        if (savedName) {
            document.getElementById('name-input').value = savedName;
        }
    });

    const AudioEngine = {
        ctx: new (window.AudioContext || window.webkitAudioContext)(),
        play(freq, type = 'sine', duration = 0.1) {
            if(this.ctx.state === 'suspended') this.ctx.resume();
            const osc = this.ctx.createOscillator();
            const g = this.ctx.createGain();
            osc.type = type;
            osc.frequency.setValueAtTime(freq, this.ctx.currentTime);
            g.gain.setValueAtTime(0.1, this.ctx.currentTime);
            g.gain.exponentialRampToValueAtTime(0.0001, this.ctx.currentTime + duration);
            osc.connect(g); g.connect(this.ctx.destination);
            osc.start(); osc.stop(this.ctx.currentTime + duration);
        },
        click() { this.play(800, 'sine', 0.05); },
        success() {
            this.play(523, 'triangle', 0.1);
            setTimeout(() => this.play(659, 'triangle', 0.1), 80);
            setTimeout(() => this.play(783, 'triangle', 0.2), 160);
        }
    };

    // To'liq baza uchun oldingi koddan DB obyektini ko'chirib olishingiz mumkin.
    // Men kodni ixcham saqlash uchun qisqartirdim.

    let userXP = parseInt(localStorage.getItem('xoleric_xp')) || 0;
    let progressMap = JSON.parse(localStorage.getItem('xoleric_progress')) || {};
    let currentLetter = "", currentStep = 1, currentWordIdx = 0, currentWord = "", targetClean = "";
    let appStarted = false;
    let userName = "";

    function initApp() {
        const nameInput = document.getElementById('name-input');
        if(!nameInput.value.trim()) { nameInput.focus(); return; }
        
        userName = nameInput.value.trim();
        // Ismni xotiraga saqlash
        localStorage.setItem('xoleric_username', userName);
        
        document.getElementById('user-display').innerText = userName.toUpperCase();
        document.getElementById('xp-count').innerText = userXP;
        
        requestAccess();
        appStarted = true;
        
        document.getElementById('welcome-view').style.opacity = '0';
        setTimeout(() => {
            document.getElementById('welcome-view').style.display = 'none';
            document.getElementById('app-shell').style.display = 'flex';
            setTimeout(() => document.getElementById('app-shell').style.opacity = '1', 50);
            renderHub();
        }, 600);
    }

    function renderHub() {
        const grid = document.getElementById('alphabet-grid');
        grid.innerHTML = '';
        Object.keys(DB).forEach(char => {
            const tile = document.createElement('div');
            tile.className = 'letter-tile glass';
            tile.innerText = char;
            
            const prog = progressMap[char] || 0;
            const bar = document.createElement('div');
            bar.className = 'tile-progress';
            const fill = document.createElement('div');
            fill.className = 'tile-progress-fill';
            fill.style.width = `${prog}%`;
            bar.appendChild(fill);
            tile.appendChild(bar);
            
            tile.onclick = () => startFocus(char);
            grid.appendChild(tile);
        });
    }

    function startFocus(char) {
        currentLetter = char;
        currentStep = 1;
        currentWordIdx = 0;
        document.getElementById('hub-view').classList.add('hidden');
        document.getElementById('focus-view').style.display = 'flex';
        loadWord();
    }

    function closeFocus() {
        document.getElementById('focus-view').style.display = 'none';
        document.getElementById('hub-view').classList.remove('hidden');
        renderHub();
    }

    function loadWord() {
        // Xato bo'lmasligi uchun tekshiruv
        if (!DB[currentLetter] || !DB[currentLetter][`step${currentStep}`]) {
            closeFocus();
            return;
        }

        const list = DB[currentLetter][`step${currentStep}`];
        currentWord = list[currentWordIdx];
        targetClean = currentWord.replace(/[-']/g, '').toLowerCase();
        
        document.getElementById('step-id').innerText = `${currentStep}-BOSQICH`;
        const box = document.getElementById('word-box');
        
        const syls = currentWord.split('-');
        box.innerHTML = syls.map((s, i) => `<span class="${i%2===0?'vocal':'consonant'}">${s}</span>`).join('<span class="dash">-</span>');
        
        const input = document.getElementById('hidden-input');
        input.value = '';
        document.getElementById('text-mirror').innerText = '';
        document.getElementById('mirror-field').className = 'mirror-field';
        document.getElementById('status-msg').style.opacity = '0';
        document.getElementById('btn-next').classList.remove('active');
        document.getElementById('input-cursor').style.display = 'inline-block';
        
        speakCurrent();
        forceFocus();
    }

    function forceFocus() { document.getElementById('hidden-input').focus(); }

    document.getElementById('hidden-input').addEventListener('input', (e) => {
        const val = e.target.value.toLowerCase();
        document.getElementById('text-mirror').innerText = val;
        AudioEngine.click();
        
        if(val.replace(/['\s-]/g, '') === targetClean) {
            markMatch();
        }
    });

    document.getElementById('hidden-input').addEventListener('keydown', (e) => {
        if(e.key === 'Enter' && document.getElementById('btn-next').classList.contains('active')) {
            handleNext();
        }
    });

    function markMatch() {
        AudioEngine.success();
        document.getElementById('mirror-field').classList.add('match');
        document.getElementById('input-cursor').style.display = 'none';
        document.getElementById('status-msg').style.opacity = '1';
        document.getElementById('btn-next').classList.add('active');
        document.getElementById('hidden-input').blur(); // Klaviaturani yopish
        
        userXP += 10;
        document.getElementById('xp-count').innerText = userXP;
        localStorage.setItem('xoleric_xp', userXP);
        
        const progress = Math.floor((( (currentStep-1)*6 + (currentWordIdx+1) ) / 36) * 100);
        progressMap[currentLetter] = Math.max(progressMap[currentLetter] || 0, progress);
        localStorage.setItem('xoleric_progress', JSON.stringify(progressMap));
    }

    function handleNext() {
        currentWordIdx++;
        if(currentWordIdx >= 6) {
            currentWordIdx = 0;
            currentStep++;
        }
        
        if(currentStep > 6 || !DB[currentLetter][`step${currentStep}`]) {
            closeFocus();
        } else {
            loadWord();
        }
    }

    function speakCurrent() {
        const text = currentWord.replace(/-/g, '');
        const utterance = new SpeechSynthesisUtterance(text);
        utterance.lang = 'uz-UZ';
        utterance.rate = 0.8;
        window.speechSynthesis.speak(utterance);
    }

    // --- GUARD & SECURITY ---
    let taps = 0, lastTap = 0;
    window.addEventListener('touchstart', (e) => {
        if(!appStarted || e.target.tagName === 'INPUT' || e.target.tagName === 'BUTTON') return;
        const now = Date.now();
        if(now - lastTap < 400) taps++; else taps = 1;
        lastTap = now;
        if(taps >= 6) { exitSystem(); taps = 0; }
    });

    function requestAccess() {
        const doc = document.documentElement;
        if(doc.requestFullscreen) doc.requestFullscreen().catch(()=>{});
        else if(doc.webkitRequestFullscreen) doc.webkitRequestFullscreen().catch(()=>{});
        document.getElementById('guard-overlay').style.display = 'none';
        AudioEngine.click();
    }

    function exitSystem() {
        appStarted = false;
        if(document.exitFullscreen) document.exitFullscreen().catch(()=>{});
        alert("XOLƎRIƆ seansi yakunlandi.");
        location.reload();
    }

    document.addEventListener('fullscreenchange', () => {
        if(appStarted && !document.fullscreenElement && !document.webkitIsFullScreen) {
            document.getElementById('guard-overlay').style.display = 'flex';
        }
    });
</script>
</body>
</html>
