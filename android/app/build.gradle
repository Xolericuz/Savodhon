plugins {
    id 'com.android.application'
}

android {
    namespace 'com.xoleric.savodhon'
    compileSdk 34

    defaultConfig {
        applicationId 'com.xoleric.savodhon'
        minSdk 21
        targetSdk 34
        versionCode 2
        versionName '2.0.0'
    }

    buildTypes {
        release {
            minifyEnabled true
            proguardFiles getDefaultProguardFile('proguard-android-optimize.txt'), 'proguard-rules.pro'
        }
    }

    compileOptions {
        sourceCompatibility JavaVersion.VERSION_1_8
        targetCompatibility JavaVersion.VERSION_1_8
    }
}

dependencies {
}
